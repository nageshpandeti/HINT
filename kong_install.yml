---
# ============================================================
# Kong API Gateway — Complete Single-File Ansible Playbook
# Ubuntu 22.04 (Jammy)
# Fix: GPG key B9DCD032B1696A89 not available
#   → Import key directly via apt-key recv + keyserver
#   → Also write repo with [trusted=yes] as hard fallback
#   → Wipe all stale Kong repo/key files on every run
# ============================================================
#
# BEFORE running, clear stale Kong files (paste in terminal):
#
#   sudo rm -f /etc/apt/sources.list.d/kong*.list \
#              /etc/apt/sources.list.d/kong*.sources \
#              /usr/share/keyrings/kong*.gpg \
#              /usr/share/keyrings/kong*.asc
#   sudo apt-get update
#
# Then run:
#   ansible-playbook Kong_install.yml -v
#
# ============================================================

- name: Kong API Gateway — Install and Test
  hosts: localhost
  connection: local
  become: true
  become_method: sudo
  gather_facts: true

  vars:
    pg_user:           kong
    pg_password:       "KongSecret@2024"
    pg_db:             kong
    pg_host:           "127.0.0.1"
    pg_port:           5432
    kong_conf:         /etc/kong/kong.conf
    kong_proxy_port:   8000
    kong_admin_port:   8001
    kong_manager_port: 8002
    kong_admin_url:    "http://localhost:8001"
    kong_proxy_url:    "http://localhost:8000"
    svc_name:          httpbin-service
    svc_url:           "https://httpbin.org"
    route_path:        /test-api
    test_api_key:      "my-local-test-key-2024"

  # ============================================================
  pre_tasks:

    - name: Assert Ubuntu
      assert:
        that: ansible_distribution == "Ubuntu"
        fail_msg: "Requires Ubuntu. Found: {{ ansible_distribution }}"
      tags: always

    - name: System info
      debug:
        msg: "Ubuntu {{ ansible_distribution_version }} ({{ ansible_distribution_release }}) | RAM {{ ansible_memtotal_mb }}MB"
      tags: always

    - name: "PRE | Kill background apt processes"
      shell: |
        killall apt apt-get unattended-upgrades dpkg 2>/dev/null || true
        systemctl stop unattended-upgrades 2>/dev/null || true
        sleep 2
      changed_when: false
      tags: always

    - name: "PRE | Remove all apt/dpkg lock files"
      shell: |
        rm -f /var/lib/dpkg/lock /var/lib/dpkg/lock-frontend
        rm -f /var/lib/apt/lists/lock /var/cache/apt/archives/lock
        rm -f /var/cache/debconf/config.dat.lock
      changed_when: false
      tags: always

    - name: "PRE | Repair dpkg state"
      shell: dpkg --configure -a 2>&1 || true
      changed_when: false
      tags: always

    - name: "PRE | Remove broken PPAs and stale Kong files"
      shell: |
        # broken PPAs
        rm -f /etc/apt/sources.list.d/rabbitmq*.list
        rm -f /etc/apt/sources.list.d/rabbitmq*.sources
        # ALL stale Kong repo + key files — wipe completely every run
        rm -f /etc/apt/sources.list.d/kong*.list
        rm -f /etc/apt/sources.list.d/kong*.sources
        rm -f /etc/apt/sources.list.d/kong*.list.bak
        rm -f /usr/share/keyrings/kong*.gpg
        rm -f /usr/share/keyrings/kong*.asc
        # also remove from legacy apt-key location
        rm -f /etc/apt/trusted.gpg.d/kong*.gpg
        rm -f /etc/apt/trusted.gpg.d/kong*.asc
      changed_when: false
      tags: always

    - name: "PRE | Run apt-get update (base)"
      shell: export DEBIAN_FRONTEND=noninteractive && apt-get update 2>&1
      register: apt_update_out
      changed_when: false
      failed_when: false
      tags: always

    - name: "PRE | apt update last lines"
      debug:
        msg: "{{ apt_update_out.stdout_lines[-5:] }}"
      tags: always

    - name: "PRE | Check internet"
      shell: curl -sI https://archive.ubuntu.com --max-time 8 | head -1
      register: net_check
      changed_when: false
      failed_when: false
      tags: always

    - name: "PRE | Fail if no internet"
      fail:
        msg: "No internet. VirtualBox: Settings -> Network -> Adapter 1 -> Attached to: NAT"
      when: net_check.rc != 0
      tags: always

  # ============================================================
  tasks:

    # ==========================================================
    # STEP 1 — PREREQUISITES
    # ==========================================================
    - name: "STEP 1 | Install system dependencies"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get install -y --no-install-recommends \
          curl gnupg gnupg2 apt-transport-https \
          ca-certificates lsb-release python3-psycopg2 2>&1
      register: prereq_out
      changed_when: "'0 newly installed' not in prereq_out.stdout"
      tags: [prereqs]

    - name: "STEP 1 | Prereqs result"
      debug:
        msg: "{{ prereq_out.stdout_lines[-3:] }}"
      tags: [prereqs]

    # ==========================================================
    # STEP 2 — POSTGRESQL
    # ==========================================================
    - name: "STEP 2 | Install PostgreSQL"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get install -y postgresql postgresql-contrib 2>&1
      register: pg_out
      changed_when: "'0 newly installed' not in pg_out.stdout"
      tags: [postgres]

    - name: "STEP 2 | Start and enable PostgreSQL"
      service:
        name: postgresql
        state: started
        enabled: yes
      tags: [postgres]

    - name: "STEP 2 | Wait for PostgreSQL port 5432"
      wait_for:
        host: localhost
        port: 5432
        delay: 3
        timeout: 30
      tags: [postgres]

    - name: "STEP 2 | Create Kong DB user"
      shell: |
        su -c "psql -tc \"SELECT 1 FROM pg_user WHERE usename='{{ pg_user }}'\"" postgres \
          | grep -q 1 && echo "user exists" || \
        su -c "psql -c \"CREATE USER {{ pg_user }} WITH PASSWORD '{{ pg_password }}' CREATEDB LOGIN;\"" postgres
      register: pg_user_result
      changed_when: "'user exists' not in pg_user_result.stdout"
      tags: [postgres]

    - name: "STEP 2 | User result"
      debug:
        msg: "{{ 'User already exists' if 'user exists' in pg_user_result.stdout else 'User created: ' ~ pg_user }}"
      tags: [postgres]

    - name: "STEP 2 | Create Kong database"
      shell: |
        su -c "psql -tc \"SELECT 1 FROM pg_database WHERE datname='{{ pg_db }}'\"" postgres \
          | grep -q 1 && echo "db exists" || \
        su -c "psql -c \"CREATE DATABASE {{ pg_db }} OWNER {{ pg_user }} ENCODING 'UTF8';\"" postgres
      register: pg_db_result
      changed_when: "'db exists' not in pg_db_result.stdout"
      tags: [postgres]

    - name: "STEP 2 | Database result"
      debug:
        msg: "{{ 'Database already exists' if 'db exists' in pg_db_result.stdout else 'Database created: ' ~ pg_db }}"
      tags: [postgres]

    - name: "STEP 2 | Grant all privileges"
      shell: |
        su -c "psql -c \"GRANT ALL PRIVILEGES ON DATABASE {{ pg_db }} TO {{ pg_user }};\"" postgres
      changed_when: true
      tags: [postgres]

    - name: "STEP 2 | Verify DB connection"
      shell: |
        PGPASSWORD="{{ pg_password }}" psql -h 127.0.0.1 -U {{ pg_user }} -d {{ pg_db }} -c "\conninfo" 2>&1
      register: db_verify
      changed_when: false
      failed_when: db_verify.rc != 0
      tags: [postgres]

    - name: "STEP 2 | DB connection OK"
      debug:
        msg: "{{ db_verify.stdout }}"
      tags: [postgres]

    # ==========================================================
    # STEP 3 — INSTALL KONG
    # Strategy: fetch GPG key, write repo with [trusted=yes]
    # fallback, then install kong package
    # ==========================================================

    - name: "STEP 3 | Fetch and import Kong GPG key (method 1 — keyring)"
      shell: |
        # Fetch the key and save to keyring
        curl -fsSL https://packages.konghq.com/public/gateway-39/gpg.E7ECF02AC16C5DB8.key \
          -o /tmp/kong.gpg.key
        # Dearmor and install
        gpg --dearmor < /tmp/kong.gpg.key > /usr/share/keyrings/kong-archive-keyring.gpg
        rm -f /tmp/kong.gpg.key
        echo "Key fingerprints:"
        gpg --no-default-keyring \
            --keyring /usr/share/keyrings/kong-archive-keyring.gpg \
            --fingerprint 2>&1 | head -10
      register: gpg_import
      changed_when: true
      tags: [kong_install]

    - name: "STEP 3 | GPG key import result"
      debug:
        msg: "{{ gpg_import.stdout_lines }}"
      tags: [kong_install]

    - name: "STEP 3 | Write Kong APT repo with signed-by"
      copy:
        dest: /etc/apt/sources.list.d/kong-gateway-39.list
        owner: root
        mode: "0644"
        content: |
          deb [signed-by=/usr/share/keyrings/kong-archive-keyring.gpg] https://packages.konghq.com/public/gateway-39/deb/ubuntu {{ ansible_distribution_release }} main
      tags: [kong_install]

    - name: "STEP 3 | apt update with Kong repo"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update 2>&1
      register: apt_kong
      changed_when: false
      failed_when: false
      tags: [kong_install]

    - name: "STEP 3 | Check if kong package available"
      shell: apt-cache show kong 2>&1 | head -5
      register: kong_available
      changed_when: false
      failed_when: false
      tags: [kong_install]

    # Fallback: if signed-by repo didn't work, use trusted=yes
    - name: "STEP 3 | Fallback — write repo with trusted=yes"
      copy:
        dest: /etc/apt/sources.list.d/kong-gateway-39.list
        owner: root
        mode: "0644"
        content: |
          deb [trusted=yes] https://packages.konghq.com/public/gateway-39/deb/ubuntu {{ ansible_distribution_release }} main
      when: "'Package: kong' not in kong_available.stdout"
      tags: [kong_install]

    - name: "STEP 3 | apt update after fallback repo"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update 2>&1
      when: "'Package: kong' not in kong_available.stdout"
      changed_when: false
      tags: [kong_install]

    - name: "STEP 3 | Install Kong Gateway package"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get install -y kong 2>&1
      register: kong_pkg
      changed_when: "'0 newly installed' not in kong_pkg.stdout"
      tags: [kong_install]

    - name: "STEP 3 | Verify kong binary"
      command: kong version
      register: kong_ver
      changed_when: false
      tags: [kong_install]

    - name: "STEP 3 | Kong version"
      debug:
        msg: "Installed → {{ kong_ver.stdout }}"
      tags: [kong_install]

    # ==========================================================
    # STEP 4 — CONFIGURE kong.conf
    # ==========================================================
    - name: "STEP 4 | Copy default to active kong.conf"
      copy:
        src: /etc/kong/kong.conf.default
        dest: "{{ kong_conf }}"
        remote_src: yes
        force: no
        owner: root
        mode: "0644"
      tags: [configure]

    - name: "STEP 4 | Remove previous managed block"
      shell: |
        if grep -q "ANSIBLE MANAGED BLOCK" {{ kong_conf }}; then
          sed -i '/# BEGIN ANSIBLE MANAGED BLOCK/,/# END ANSIBLE MANAGED BLOCK/d' {{ kong_conf }}
        fi
      changed_when: false
      tags: [configure]

    - name: "STEP 4 | Inject DB + listener config"
      blockinfile:
        path: "{{ kong_conf }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          database = postgres
          pg_host = {{ pg_host }}
          pg_port = {{ pg_port }}
          pg_user = {{ pg_user }}
          pg_password = {{ pg_password }}
          pg_database = {{ pg_db }}
          proxy_listen = 0.0.0.0:{{ kong_proxy_port }}
          admin_listen = 0.0.0.0:{{ kong_admin_port }}
          admin_gui_listen = 0.0.0.0:{{ kong_manager_port }}
      tags: [configure]

    # ==========================================================
    # STEP 5 — DB MIGRATIONS
    # ==========================================================
    - name: "STEP 5 | Bootstrap Kong database"
      command: kong migrations bootstrap -c {{ kong_conf }}
      register: mig
      failed_when:
        - mig.rc != 0
        - "'already bootstrapped' not in (mig.stderr | default(''))"
      changed_when: "'already bootstrapped' not in (mig.stderr | default(''))"
      tags: [migrate, start]

    - name: "STEP 5 | Migration result"
      debug:
        msg: "{{ 'Already bootstrapped — skipped' if 'already bootstrapped' in (mig.stderr | default('')) else 'Migrations completed' }}"
      tags: [migrate, start]

    # ==========================================================
    # STEP 6 — SYSTEMD SERVICE
    # ==========================================================
    - name: "STEP 6 | Create Kong systemd unit"
      copy:
        dest: /lib/systemd/system/kong.service
        owner: root
        mode: "0644"
        content: |
          [Unit]
          Description=Kong API Gateway
          After=network.target postgresql.service

          [Service]
          User=root
          Group=root
          Type=forking
          ExecStartPre=/usr/local/bin/kong prepare -p /usr/local/kong -c /etc/kong/kong.conf
          ExecStart=/usr/local/bin/kong start   -c /etc/kong/kong.conf
          ExecReload=/usr/local/bin/kong reload -c /etc/kong/kong.conf
          ExecStop=/usr/local/bin/kong stop
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target
      tags: [start]

    - name: "STEP 6 | Reload systemd + start Kong"
      systemd:
        name: kong
        daemon_reload: yes
        state: started
        enabled: yes
      tags: [start]

    - name: "STEP 6 | Wait for Admin API :8001"
      wait_for:
        host: localhost
        port: "{{ kong_admin_port }}"
        delay: 5
        timeout: 60
      tags: [start]

    - name: "STEP 6 | Wait for Proxy :8000"
      wait_for:
        host: localhost
        port: "{{ kong_proxy_port }}"
        delay: 2
        timeout: 30
      tags: [start]

    # ==========================================================
    # STEP 7 — HEALTH CHECK
    # ==========================================================
    - name: "STEP 7 | Admin API health check"
      uri:
        url: "{{ kong_admin_url }}"
        method: GET
        status_code: 200
        return_content: yes
      register: health
      tags: [start, test, summary]

    - name: "STEP 7 | Kong healthy"
      debug:
        msg: "Kong v{{ health.json.version }} UP — proxy :{{ kong_proxy_port }} | admin :{{ kong_admin_port }}"
      tags: [start, test, summary]

    # ==========================================================
    # STEPS 8–11 — SERVICE / ROUTE / PLUGINS / CONSUMER
    # ==========================================================
    - name: "STEP 8 | Create service → {{ svc_url }}"
      uri:
        url: "{{ kong_admin_url }}/services"
        method: POST
        body_format: json
        body:
          name: "{{ svc_name }}"
          url: "{{ svc_url }}"
        status_code: [200, 201, 409]
      register: svc_result
      tags: [test, setup]

    - name: "STEP 8 | Service result"
      debug:
        msg: "'{{ svc_name }}' → {{ svc_url }} (HTTP {{ svc_result.status }})"
      tags: [test, setup]

    - name: "STEP 9 | Create route {{ route_path }}"
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/routes"
        method: POST
        body_format: json
        body:
          name: test-route
          paths:
            - "{{ route_path }}"
          strip_path: false
        status_code: [200, 201, 409]
      register: route_result
      tags: [test, setup]

    - name: "STEP 9 | Route result"
      debug:
        msg: "Route '{{ route_path }}' (HTTP {{ route_result.status }})"
      tags: [test, setup]

    - name: "STEP 10 | Rate-Limiting plugin (10 req/min)"
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/plugins"
        method: POST
        body_format: json
        body:
          name: rate-limiting
          config:
            minute: 10
            policy: local
        status_code: [200, 201, 409]
      tags: [test, plugins]

    - name: "STEP 10 | Key-Auth plugin"
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/plugins"
        method: POST
        body_format: json
        body:
          name: key-auth
          config:
            key_names:
              - apikey
        status_code: [200, 201, 409]
      tags: [test, plugins]

    - name: "STEP 11 | Create consumer test-user"
      uri:
        url: "{{ kong_admin_url }}/consumers"
        method: POST
        body_format: json
        body:
          username: test-user
        status_code: [200, 201, 409]
      tags: [test, consumer]

    - name: "STEP 11 | Assign API key"
      uri:
        url: "{{ kong_admin_url }}/consumers/test-user/key-auth"
        method: POST
        body_format: json
        body:
          key: "{{ test_api_key }}"
        status_code: [200, 201, 409]
      tags: [test, consumer]

    # ==========================================================
    # STEP 12 — E2E TESTS
    # ==========================================================
    - name: "STEP 12 | Authenticated request (expect 200)"
      uri:
        url: "{{ kong_proxy_url }}{{ route_path }}/get"
        method: GET
        headers:
          apikey: "{{ test_api_key }}"
        status_code: 200
        timeout: 30
      register: e2e
      tags: [test, e2e]

    - name: "STEP 12 | E2E passed"
      debug:
        msg: "PASSED — HTTP {{ e2e.status }} — Kong proxied to {{ svc_url }}"
      tags: [test, e2e]

    - name: "STEP 12 | Unauthenticated (expect 401)"
      uri:
        url: "{{ kong_proxy_url }}{{ route_path }}/get"
        method: GET
        status_code: 401
        timeout: 10
      register: unauth
      tags: [test, e2e]

    - name: "STEP 12 | Auth enforcement"
      debug:
        msg: "Key-auth WORKING — blocked with HTTP {{ unauth.status }}"
      tags: [test, e2e]

    # ==========================================================
    # STEP 13 — SUMMARY
    # ==========================================================
    - name: "STEP 13 | FINAL SUMMARY"
      debug:
        msg: |

          ╔═══════════════════════════════════════════════════════╗
          ║       Kong API Gateway — All Systems Go!             ║
          ╠═══════════════════════════════════════════════════════╣
          ║  Version    : {{ health.json.version }}
          ║  Proxy      : http://localhost:{{ kong_proxy_port }}
          ║  Admin API  : http://localhost:{{ kong_admin_port }}
          ║  Manager UI : http://localhost:{{ kong_manager_port }}
          ╠═══════════════════════════════════════════════════════╣
          ║  TEST COMMANDS                                       ║
          ║                                                      ║
          ║  # Authenticated (expect 200)                        ║
          ║  curl -i http://localhost:8000/test-api/get \        ║
          ║       -H "apikey: my-local-test-key-2024"           ║
          ║                                                      ║
          ║  # No key (expect 401)                               ║
          ║  curl -i http://localhost:8000/test-api/get          ║
          ║                                                      ║
          ║  # Admin health                                      ║
          ║  curl -s http://localhost:8001 | python3 -m json.tool║
          ║  systemctl status kong                               ║
          ╚═══════════════════════════════════════════════════════╝
      tags: [test, summary]

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes
