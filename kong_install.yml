---
# ============================================================
# Kong API Gateway — Complete Single-File Ansible Playbook
# Ubuntu 22.04 (Jammy) — FINAL WORKING VERSION
#
# Fix: httpbin.org public instance returns 404 unreliably
#   → Spin up a local Python HTTP server on port 9090
#   → Kong proxies to localhost:9090 (always returns 200)
#   → No external dependency, works 100% offline too
#
# Run:  ansible-playbook Kong_install.yml -v
# ============================================================

- name: Kong API Gateway — Install and Test
  hosts: localhost
  connection: local
  become: true
  become_method: sudo
  gather_facts: true

  vars:
    pg_user:           kong
    pg_password:       "KongSecret@2024"
    pg_db:             kong
    pg_host:           "127.0.0.1"
    pg_port:           5432
    kong_conf:         /etc/kong/kong.conf
    kong_proxy_port:   8000
    kong_admin_port:   8001
    kong_manager_port: 8002
    kong_admin_url:    "http://localhost:8001"
    kong_proxy_url:    "http://localhost:8000"
    # Local mock backend — guaranteed 200, no external dependency
    mock_port:         9090
    svc_name:          local-mock-service
    svc_url:           "http://localhost:9090"
    route_path:        /test-api
    test_api_key:      "my-local-test-key-2024"

  # ============================================================
  pre_tasks:

    - name: Assert Ubuntu
      assert:
        that: ansible_distribution == "Ubuntu"
        fail_msg: "Requires Ubuntu. Found: {{ ansible_distribution }}"
      tags: always

    - name: System info
      debug:
        msg: "Ubuntu {{ ansible_distribution_version }} ({{ ansible_distribution_release }}) | RAM {{ ansible_memtotal_mb }}MB"
      tags: always

    - name: "PRE | Kill background apt processes"
      shell: |
        killall apt apt-get unattended-upgrades dpkg 2>/dev/null || true
        systemctl stop unattended-upgrades 2>/dev/null || true
        sleep 2
      changed_when: false
      tags: always

    - name: "PRE | Remove all apt/dpkg lock files"
      shell: |
        rm -f /var/lib/dpkg/lock /var/lib/dpkg/lock-frontend
        rm -f /var/lib/apt/lists/lock /var/cache/apt/archives/lock
        rm -f /var/cache/debconf/config.dat.lock
      changed_when: false
      tags: always

    - name: "PRE | Repair dpkg state"
      shell: dpkg --configure -a 2>&1 || true
      changed_when: false
      tags: always

    - name: "PRE | Remove broken PPAs + stale Kong files"
      shell: |
        rm -f /etc/apt/sources.list.d/rabbitmq*.list
        rm -f /etc/apt/sources.list.d/rabbitmq*.sources
        rm -f /etc/apt/sources.list.d/kong*.list
        rm -f /etc/apt/sources.list.d/kong*.sources
        rm -f /etc/apt/sources.list.d/kong*.list.bak
        rm -f /usr/share/keyrings/kong*.gpg
        rm -f /usr/share/keyrings/kong*.asc
        rm -f /etc/apt/trusted.gpg.d/kong*.gpg
      changed_when: false
      tags: always

    - name: "PRE | apt-get update"
      shell: export DEBIAN_FRONTEND=noninteractive && apt-get update 2>&1
      register: apt_update_out
      changed_when: false
      failed_when: false
      tags: always

    - name: "PRE | Check internet"
      shell: curl -sI https://archive.ubuntu.com --max-time 8 | head -1
      register: net_check
      changed_when: false
      failed_when: false
      tags: always

    - name: "PRE | Fail if no internet"
      fail:
        msg: "No internet. VirtualBox: Settings -> Network -> Adapter 1 -> Attached to: NAT"
      when: net_check.rc != 0
      tags: always

  # ============================================================
  tasks:

    # ==========================================================
    # STEP 1 — PREREQUISITES
    # ==========================================================
    - name: "STEP 1 | Install system dependencies"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get install -y --no-install-recommends \
          curl gnupg gnupg2 apt-transport-https \
          ca-certificates lsb-release python3-psycopg2 2>&1
      register: prereq_out
      changed_when: "'0 newly installed' not in prereq_out.stdout"
      tags: [prereqs]

    - name: "STEP 1 | Done"
      debug:
        msg: "{{ prereq_out.stdout_lines[-3:] }}"
      tags: [prereqs]

    # ==========================================================
    # STEP 2 — LOCAL MOCK BACKEND SERVER
    # Python HTTP server on port 9090, always returns 200
    # ==========================================================
    - name: "STEP 2 | Kill any process on port {{ mock_port }}"
      shell: fuser -k {{ mock_port }}/tcp 2>/dev/null || true
      changed_when: false
      tags: [mock]

    - name: "STEP 2 | Create mock server script"
      copy:
        dest: /tmp/mock_server.py
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json, datetime

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  body = json.dumps({
                      "status": "ok",
                      "path": self.path,
                      "method": "GET",
                      "message": "Kong API Gateway mock backend",
                      "timestamp": datetime.datetime.utcnow().isoformat()
                  }).encode()
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def log_message(self, fmt, *args):
                  pass  # suppress logs

          if __name__ == "__main__":
              server = HTTPServer(("0.0.0.0", {{ mock_port }}), Handler)
              print("Mock server listening on :{{ mock_port }}")
              server.serve_forever()
      tags: [mock]

    - name: "STEP 2 | Start mock backend server (background)"
      shell: |
        nohup python3 /tmp/mock_server.py > /tmp/mock_server.log 2>&1 &
        echo $! > /tmp/mock_server.pid
        sleep 1
        echo "PID: $(cat /tmp/mock_server.pid)"
      changed_when: true
      tags: [mock]

    - name: "STEP 2 | Wait for mock backend on port {{ mock_port }}"
      wait_for:
        host: localhost
        port: "{{ mock_port }}"
        delay: 1
        timeout: 15
      tags: [mock]

    - name: "STEP 2 | Verify mock backend responds"
      uri:
        url: "http://localhost:{{ mock_port }}/health"
        method: GET
        status_code: 200
      register: mock_check
      tags: [mock]

    - name: "STEP 2 | Mock backend OK"
      debug:
        msg: "Mock backend running on :{{ mock_port }} — response: {{ mock_check.json }}"
      tags: [mock]

    # ==========================================================
    # STEP 3 — POSTGRESQL
    # ==========================================================
    - name: "STEP 3 | Install PostgreSQL"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get install -y postgresql postgresql-contrib 2>&1
      register: pg_out
      changed_when: "'0 newly installed' not in pg_out.stdout"
      tags: [postgres]

    - name: "STEP 3 | Start and enable PostgreSQL"
      service:
        name: postgresql
        state: started
        enabled: yes
      tags: [postgres]

    - name: "STEP 3 | Wait for PostgreSQL :5432"
      wait_for:
        host: localhost
        port: 5432
        delay: 3
        timeout: 30
      tags: [postgres]

    - name: "STEP 3 | Create Kong DB user"
      shell: |
        su -c "psql -tc \"SELECT 1 FROM pg_user WHERE usename='{{ pg_user }}'\"" postgres \
          | grep -q 1 && echo "user exists" || \
        su -c "psql -c \"CREATE USER {{ pg_user }} WITH PASSWORD '{{ pg_password }}' CREATEDB LOGIN;\"" postgres
      register: pg_user_result
      changed_when: "'user exists' not in pg_user_result.stdout"
      tags: [postgres]

    - name: "STEP 3 | Create Kong database"
      shell: |
        su -c "psql -tc \"SELECT 1 FROM pg_database WHERE datname='{{ pg_db }}'\"" postgres \
          | grep -q 1 && echo "db exists" || \
        su -c "psql -c \"CREATE DATABASE {{ pg_db }} OWNER {{ pg_user }} ENCODING 'UTF8';\"" postgres
      register: pg_db_result
      changed_when: "'db exists' not in pg_db_result.stdout"
      tags: [postgres]

    - name: "STEP 3 | Grant all privileges"
      shell: |
        su -c "psql -c \"GRANT ALL PRIVILEGES ON DATABASE {{ pg_db }} TO {{ pg_user }};\"" postgres
      changed_when: true
      tags: [postgres]

    - name: "STEP 3 | Verify DB connection"
      shell: |
        PGPASSWORD="{{ pg_password }}" psql -h 127.0.0.1 -U {{ pg_user }} -d {{ pg_db }} -c "\conninfo" 2>&1
      register: db_verify
      changed_when: false
      failed_when: db_verify.rc != 0
      tags: [postgres]

    - name: "STEP 3 | DB OK"
      debug:
        msg: "{{ db_verify.stdout }}"
      tags: [postgres]

    # ==========================================================
    # STEP 4 — INSTALL KONG
    # ==========================================================
    - name: "STEP 4 | Check if Kong already installed"
      command: which kong
      register: kong_installed
      changed_when: false
      failed_when: false
      tags: [kong_install]

    - name: "STEP 4 | Fetch and import Kong GPG key"
      shell: |
        curl -fsSL https://packages.konghq.com/public/gateway-39/gpg.E7ECF02AC16C5DB8.key \
          -o /tmp/kong.gpg.key
        gpg --dearmor < /tmp/kong.gpg.key > /usr/share/keyrings/kong-archive-keyring.gpg
        rm -f /tmp/kong.gpg.key
      when: kong_installed.rc != 0
      changed_when: true
      tags: [kong_install]

    - name: "STEP 4 | Write Kong APT repo"
      copy:
        dest: /etc/apt/sources.list.d/kong-gateway-39.list
        content: |
          deb [signed-by=/usr/share/keyrings/kong-archive-keyring.gpg] https://packages.konghq.com/public/gateway-39/deb/ubuntu {{ ansible_distribution_release }} main
      when: kong_installed.rc != 0
      tags: [kong_install]

    - name: "STEP 4 | apt update after Kong repo"
      shell: export DEBIAN_FRONTEND=noninteractive && apt-get update 2>&1
      when: kong_installed.rc != 0
      changed_when: false
      failed_when: false
      tags: [kong_install]

    - name: "STEP 4 | Fallback — trusted=yes repo if signed-by failed"
      block:
        - name: Check kong package in cache
          shell: apt-cache show kong 2>&1 | head -3
          register: kong_available
          changed_when: false

        - name: Write trusted=yes repo
          copy:
            dest: /etc/apt/sources.list.d/kong-gateway-39.list
            content: |
              deb [trusted=yes] https://packages.konghq.com/public/gateway-39/deb/ubuntu {{ ansible_distribution_release }} main
          when: "'Package: kong' not in kong_available.stdout"

        - name: apt update after trusted repo
          shell: export DEBIAN_FRONTEND=noninteractive && apt-get update 2>&1
          when: "'Package: kong' not in kong_available.stdout"
          changed_when: false
      when: kong_installed.rc != 0
      tags: [kong_install]

    - name: "STEP 4 | Install Kong package"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get install -y kong 2>&1
      when: kong_installed.rc != 0
      changed_when: true
      tags: [kong_install]

    - name: "STEP 4 | Verify kong binary"
      command: kong version
      register: kong_ver
      changed_when: false
      tags: [kong_install]

    - name: "STEP 4 | Kong version"
      debug:
        msg: "Kong → {{ kong_ver.stdout }}"
      tags: [kong_install]

    # ==========================================================
    # STEP 5 — CONFIGURE kong.conf
    # ==========================================================
    - name: "STEP 5 | Copy default to active kong.conf"
      copy:
        src: /etc/kong/kong.conf.default
        dest: "{{ kong_conf }}"
        remote_src: yes
        force: no
        owner: root
        mode: "0644"
      tags: [configure]

    - name: "STEP 5 | Remove previous managed block"
      shell: |
        if grep -q "ANSIBLE MANAGED BLOCK" {{ kong_conf }}; then
          sed -i '/# BEGIN ANSIBLE MANAGED BLOCK/,/# END ANSIBLE MANAGED BLOCK/d' {{ kong_conf }}
        fi
      changed_when: false
      tags: [configure]

    - name: "STEP 5 | Inject DB + listener config"
      blockinfile:
        path: "{{ kong_conf }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          database = postgres
          pg_host = {{ pg_host }}
          pg_port = {{ pg_port }}
          pg_user = {{ pg_user }}
          pg_password = {{ pg_password }}
          pg_database = {{ pg_db }}
          proxy_listen = 0.0.0.0:{{ kong_proxy_port }}
          admin_listen = 0.0.0.0:{{ kong_admin_port }}
          admin_gui_listen = 0.0.0.0:{{ kong_manager_port }}
      tags: [configure]

    # ==========================================================
    # STEP 6 — DB MIGRATIONS
    # ==========================================================
    - name: "STEP 6 | Bootstrap Kong database"
      command: kong migrations bootstrap -c {{ kong_conf }}
      register: mig
      failed_when:
        - mig.rc != 0
        - "'already bootstrapped' not in (mig.stderr | default(''))"
      changed_when: "'already bootstrapped' not in (mig.stderr | default(''))"
      tags: [migrate, start]

    - name: "STEP 6 | Migration result"
      debug:
        msg: "{{ 'Already bootstrapped — skipped' if 'already bootstrapped' in (mig.stderr | default('')) else 'Migrations completed' }}"
      tags: [migrate, start]

    # ==========================================================
    # STEP 7 — SYSTEMD SERVICE
    # ==========================================================
    - name: "STEP 7 | Create Kong systemd unit"
      copy:
        dest: /lib/systemd/system/kong.service
        owner: root
        mode: "0644"
        content: |
          [Unit]
          Description=Kong API Gateway
          After=network.target postgresql.service

          [Service]
          User=root
          Group=root
          Type=forking
          ExecStartPre=/usr/local/bin/kong prepare -p /usr/local/kong -c /etc/kong/kong.conf
          ExecStart=/usr/local/bin/kong start   -c /etc/kong/kong.conf
          ExecReload=/usr/local/bin/kong reload -c /etc/kong/kong.conf
          ExecStop=/usr/local/bin/kong stop
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target
      tags: [start]

    - name: "STEP 7 | Reload systemd + start Kong"
      systemd:
        name: kong
        daemon_reload: yes
        state: started
        enabled: yes
      tags: [start]

    - name: "STEP 7 | Wait for Admin API :8001"
      wait_for:
        host: localhost
        port: "{{ kong_admin_port }}"
        delay: 5
        timeout: 60
      tags: [start]

    - name: "STEP 7 | Wait for Proxy :8000"
      wait_for:
        host: localhost
        port: "{{ kong_proxy_port }}"
        delay: 2
        timeout: 30
      tags: [start]

    # ==========================================================
    # STEP 8 — HEALTH CHECK
    # ==========================================================
    - name: "STEP 8 | Admin API health"
      uri:
        url: "{{ kong_admin_url }}"
        method: GET
        status_code: 200
        return_content: yes
      register: health
      tags: [start, test, summary]

    - name: "STEP 8 | Kong healthy"
      debug:
        msg: "Kong v{{ health.json.version }} UP — proxy :{{ kong_proxy_port }} | admin :{{ kong_admin_port }}"
      tags: [start, test, summary]

    # ==========================================================
    # STEP 9 — CLEAN SLATE + CREATE SERVICE/ROUTE
    # ==========================================================
    - name: "STEP 9 | Delete old route if exists"
      uri:
        url: "{{ kong_admin_url }}/routes/test-route"
        method: DELETE
        status_code: [204, 404]
      tags: [test, setup]

    - name: "STEP 9 | Delete old service if exists"
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}"
        method: DELETE
        status_code: [204, 404]
      tags: [test, setup]

    - name: "STEP 9 | Create service → local mock :{{ mock_port }}"
      uri:
        url: "{{ kong_admin_url }}/services"
        method: POST
        body_format: json
        body:
          name: "{{ svc_name }}"
          url: "{{ svc_url }}"
        status_code: [200, 201]
      register: svc_result
      tags: [test, setup]

    - name: "STEP 9 | Service created"
      debug:
        msg: "'{{ svc_name }}' → {{ svc_url }} (HTTP {{ svc_result.status }})"
      tags: [test, setup]

    - name: "STEP 9 | Create route {{ route_path }}"
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/routes"
        method: POST
        body_format: json
        body:
          name: test-route
          paths:
            - "{{ route_path }}"
          strip_path: true
        status_code: [200, 201]
      register: route_result
      tags: [test, setup]

    - name: "STEP 9 | Route created"
      debug:
        msg: "Route '{{ route_path }}' strip_path=true (HTTP {{ route_result.status }})"
      tags: [test, setup]

    # ==========================================================
    # STEP 10 — PLUGINS
    # ==========================================================
    - name: "STEP 10 | Rate-Limiting plugin (10 req/min)"
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/plugins"
        method: POST
        body_format: json
        body:
          name: rate-limiting
          config:
            minute: 10
            policy: local
        status_code: [200, 201, 409]
      tags: [test, plugins]

    - name: "STEP 10 | Key-Auth plugin"
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/plugins"
        method: POST
        body_format: json
        body:
          name: key-auth
          config:
            key_names:
              - apikey
        status_code: [200, 201, 409]
      tags: [test, plugins]

    # ==========================================================
    # STEP 11 — CONSUMER + API KEY
    # ==========================================================
    - name: "STEP 11 | Delete old consumer if exists"
      uri:
        url: "{{ kong_admin_url }}/consumers/test-user"
        method: DELETE
        status_code: [204, 404]
      tags: [test, consumer]

    - name: "STEP 11 | Create consumer test-user"
      uri:
        url: "{{ kong_admin_url }}/consumers"
        method: POST
        body_format: json
        body:
          username: test-user
        status_code: [200, 201]
      tags: [test, consumer]

    - name: "STEP 11 | Assign API key"
      uri:
        url: "{{ kong_admin_url }}/consumers/test-user/key-auth"
        method: POST
        body_format: json
        body:
          key: "{{ test_api_key }}"
        status_code: [200, 201]
      tags: [test, consumer]

    # ==========================================================
    # STEP 12 — E2E TESTS (local mock — guaranteed 200)
    # ==========================================================
    - name: "STEP 12 | E2E — authenticated (expect 200)"
      uri:
        url: "{{ kong_proxy_url }}{{ route_path }}/hello"
        method: GET
        headers:
          apikey: "{{ test_api_key }}"
        status_code: 200
        timeout: 15
        return_content: yes
      register: e2e
      tags: [test, e2e]

    - name: "STEP 12 | E2E PASSED"
      debug:
        msg: >
          PASSED — HTTP {{ e2e.status }}
          Response: {{ e2e.json }}
          Rate-limit remaining: {{ e2e.x_ratelimit_remaining_minute | default('n/a') }}
      tags: [test, e2e]

    - name: "STEP 12 | E2E — unauthenticated (expect 401)"
      uri:
        url: "{{ kong_proxy_url }}{{ route_path }}/hello"
        method: GET
        status_code: 401
        timeout: 10
      register: unauth
      tags: [test, e2e]

    - name: "STEP 12 | Auth enforcement OK"
      debug:
        msg: "Key-auth WORKING — blocked with HTTP {{ unauth.status }}"
      tags: [test, e2e]

    # ==========================================================
    # STEP 13 — SUMMARY
    # ==========================================================
    - name: "STEP 13 | FINAL SUMMARY"
      debug:
        msg: |

          ╔══════════════════════════════════════════════════════════╗
          ║         Kong API Gateway — ALL SYSTEMS GO!              ║
          ╠══════════════════════════════════════════════════════════╣
          ║  Version      : {{ health.json.version }}
          ║  Proxy        : http://localhost:{{ kong_proxy_port }}
          ║  Admin API    : http://localhost:{{ kong_admin_port }}
          ║  Manager UI   : http://localhost:{{ kong_manager_port }}
          ╠══════════════════════════════════════════════════════════╣
          ║  Backend      : Local mock server :{{ mock_port }} (Python)
          ║  Service      : {{ svc_name }} → {{ svc_url }}
          ║  Route        : {{ route_path }} (strip_path=true)
          ║  Plugins      : rate-limiting (10/min) + key-auth
          ║  Consumer     : test-user
          ║  API Key      : {{ test_api_key }}
          ╠══════════════════════════════════════════════════════════╣
          ║  QUICK TEST COMMANDS                                    ║
          ║                                                         ║
          ║  # Authenticated → expect 200                          ║
          ║  curl -i http://localhost:8000/test-api/hello \        ║
          ║       -H "apikey: my-local-test-key-2024"             ║
          ║                                                         ║
          ║  # No key → expect 401                                 ║
          ║  curl -i http://localhost:8000/test-api/hello          ║
          ║                                                         ║
          ║  # Admin health                                        ║
          ║  curl -s http://localhost:8001 | python3 -m json.tool  ║
          ║  systemctl status kong                                  ║
          ╚══════════════════════════════════════════════════════════╝
      tags: [test, summary]

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes
