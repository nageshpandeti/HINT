---
- name: Kong API Gateway - Configure and Test Existing Install
  hosts: localhost
  connection: local
  become: true
  become_method: sudo
  gather_facts: true

  vars:
    pg_user: kong
    pg_password: "KongSecret@2024"
    pg_db: kong
    pg_host: "127.0.0.1"
    pg_port: 5432

    kong_conf: /etc/kong/kong.conf
    kong_proxy_port: 8000
    kong_admin_port: 8001
    kong_admin_url: "http://127.0.0.1:8001"
    kong_proxy_url: "http://127.0.0.1:8000"

    mock_port: 19090
    svc_name: local-mock-service
    svc_url: "http://127.0.0.1:19090"
    route_path: /test-api
    test_api_key: "my-local-test-key-2024"

  pre_tasks:
    - name: Assert Ubuntu
      assert:
        that: ansible_distribution == "Ubuntu"
        fail_msg: "This playbook requires Ubuntu"

    - name: Update apt cache
      apt:
        update_cache: yes
      changed_when: false

  tasks:
    - name: Install prerequisites
      apt:
        name:
          - curl
          - python3
          - python3-psycopg2
          - postgresql
          - postgresql-contrib
          - psmisc
        state: present
        update_cache: yes

    - name: Detect Kong binary
      command: which kong
      register: kong_bin
      changed_when: false
      failed_when: kong_bin.rc != 0

    - name: Show Kong version
      command: "{{ kong_bin.stdout }} version"
      register: kong_ver
      changed_when: false

    - name: Start and enable PostgreSQL
      service:
        name: postgresql
        state: started
        enabled: true

    - name: Wait for PostgreSQL
      wait_for:
        host: 127.0.0.1
        port: 5432
        timeout: 30

    - name: Create Kong DB user if missing
      shell: |
        su - postgres -c "psql -tAc \"SELECT 1 FROM pg_roles WHERE rolname='{{ pg_user }}'\"" | grep -q 1 || \
        su - postgres -c "psql -c \"CREATE USER {{ pg_user }} WITH PASSWORD '{{ pg_password }}' CREATEDB LOGIN;\""
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Create Kong database if missing
      shell: |
        su - postgres -c "psql -tAc \"SELECT 1 FROM pg_database WHERE datname='{{ pg_db }}'\"" | grep -q 1 || \
        su - postgres -c "psql -c \"CREATE DATABASE {{ pg_db }} OWNER {{ pg_user }} ENCODING 'UTF8';\""
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Grant DB privileges
      shell: |
        su - postgres -c "psql -c \"GRANT ALL PRIVILEGES ON DATABASE {{ pg_db }} TO {{ pg_user }};\""
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Kill old mock backend processes
      shell: |
        pkill -f /tmp/mock_server.py || true
        fuser -k {{ mock_port }}/tcp || true
        rm -f /tmp/mock_server.pid /tmp/mock_server.log
        sleep 2
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Create mock server script
      copy:
        dest: /tmp/mock_server.py
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          from http.server import ThreadingHTTPServer, BaseHTTPRequestHandler
          import json, datetime

          class Handler(BaseHTTPRequestHandler):
              def reply(self):
                  body = json.dumps({
                      "status": "ok",
                      "path": self.path,
                      "method": self.command,
                      "message": "Kong API Gateway mock backend",
                      "timestamp": datetime.datetime.utcnow().isoformat() + "Z"
                  }).encode("utf-8")
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def do_GET(self):
                  self.reply()

              def do_POST(self):
                  self.reply()

              def log_message(self, format, *args):
                  return

          if __name__ == "__main__":
              server = ThreadingHTTPServer(("127.0.0.1", {{ mock_port }}), Handler)
              server.serve_forever()

    - name: Start mock backend
      shell: |
        nohup python3 /tmp/mock_server.py >/tmp/mock_server.log 2>&1 &
        echo $! >/tmp/mock_server.pid
        sleep 3
      args:
        executable: /bin/bash
      changed_when: true

    - name: Wait for mock backend
      wait_for:
        host: 127.0.0.1
        port: "{{ mock_port }}"
        delay: 1
        timeout: 20

    - name: Verify mock backend root
      uri:
        url: "http://127.0.0.1:{{ mock_port }}/"
        method: GET
        status_code: 200
        return_content: yes
      register: mock_root

    - name: Verify mock backend exact forwarded path
      uri:
        url: "http://127.0.0.1:{{ mock_port }}{{ route_path }}/hello"
        method: GET
        status_code: 200
        return_content: yes
      register: mock_exact

    - name: Copy default kong.conf if missing
      copy:
        src: /etc/kong/kong.conf.default
        dest: "{{ kong_conf }}"
        remote_src: true
        force: false
        mode: "0644"

    - name: Remove old Ansible-managed block
      shell: |
        sed -i '/# BEGIN ANSIBLE MANAGED BLOCK/,/# END ANSIBLE MANAGED BLOCK/d' {{ kong_conf }} || true
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Configure kong.conf
      blockinfile:
        path: "{{ kong_conf }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          database = postgres
          pg_host = {{ pg_host }}
          pg_port = {{ pg_port }}
          pg_user = {{ pg_user }}
          pg_password = {{ pg_password }}
          pg_database = {{ pg_db }}
          proxy_listen = 0.0.0.0:{{ kong_proxy_port }}
          admin_listen = 0.0.0.0:{{ kong_admin_port }}

    - name: Check Kong config
      command: "{{ kong_bin.stdout }} check {{ kong_conf }}"
      changed_when: false

    - name: Bootstrap Kong DB
      command: "{{ kong_bin.stdout }} migrations bootstrap -c {{ kong_conf }}"
      register: mig
      failed_when: mig.rc != 0 and 'already bootstrapped' not in (mig.stderr | default(''))
      changed_when: "'already bootstrapped' not in (mig.stderr | default(''))"

    - name: Create Kong systemd unit
      copy:
        dest: /lib/systemd/system/kong.service
        mode: "0644"
        content: |
          [Unit]
          Description=Kong API Gateway
          After=network.target postgresql.service
          Wants=postgresql.service

          [Service]
          User=root
          Group=root
          Type=forking
          ExecStartPre={{ kong_bin.stdout }} prepare -p /usr/local/kong -c {{ kong_conf }}
          ExecStart={{ kong_bin.stdout }} start -c {{ kong_conf }}
          ExecReload={{ kong_bin.stdout }} reload -c {{ kong_conf }}
          ExecStop={{ kong_bin.stdout }} stop
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: true

    - name: Restart and enable Kong
      systemd:
        name: kong
        state: restarted
        enabled: true

    - name: Wait for Kong Admin API
      wait_for:
        host: 127.0.0.1
        port: "{{ kong_admin_port }}"
        timeout: 60

    - name: Wait for Kong Proxy
      wait_for:
        host: 127.0.0.1
        port: "{{ kong_proxy_port }}"
        timeout: 60

    - name: Check Admin API health
      uri:
        url: "{{ kong_admin_url }}"
        method: GET
        status_code: 200
        return_content: yes
      register: health

    - name: Delete old route
      uri:
        url: "{{ kong_admin_url }}/routes/test-route"
        method: DELETE
        status_code: [204, 404]

    - name: Delete old service
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}"
        method: DELETE
        status_code: [204, 404]

    - name: Create service
      uri:
        url: "{{ kong_admin_url }}/services"
        method: POST
        body_format: json
        body:
          name: "{{ svc_name }}"
          url: "{{ svc_url }}"
        status_code: [200, 201]

    - name: Create route
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/routes"
        method: POST
        body_format: json
        body:
          name: test-route
          paths:
            - "{{ route_path }}"
          strip_path: false
        status_code: [200, 201]

    - name: Add rate limiting plugin
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/plugins"
        method: POST
        body_format: json
        body:
          name: rate-limiting
          config:
            minute: 10
            policy: local
        status_code: [200, 201, 409]

    - name: Add key-auth plugin
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/plugins"
        method: POST
        body_format: json
        body:
          name: key-auth
          config:
            key_names:
              - apikey
        status_code: [200, 201, 409]

    - name: Delete old consumer
      uri:
        url: "{{ kong_admin_url }}/consumers/test-user"
        method: DELETE
        status_code: [204, 404]

    - name: Create consumer
      uri:
        url: "{{ kong_admin_url }}/consumers"
        method: POST
        body_format: json
        body:
          username: test-user
        status_code: [200, 201]

    - name: Assign API key
      uri:
        url: "{{ kong_admin_url }}/consumers/test-user/key-auth"
        method: POST
        body_format: json
        body:
          key: "{{ test_api_key }}"
        status_code: [200, 201]

    - name: Pause briefly for route propagation
      pause:
        seconds: 3

    - name: Verify route through Kong without auth should be 401
      uri:
        url: "{{ kong_proxy_url }}{{ route_path }}/hello"
        method: GET
        status_code: 401
        timeout: 15
      register: noauth_probe

    - name: Authenticated E2E request
      uri:
        url: "{{ kong_proxy_url }}{{ route_path }}/hello"
        method: GET
        headers:
          apikey: "{{ test_api_key }}"
        status_code: 200
        timeout: 15
        return_content: yes
      register: e2e

    - name: Final summary
      debug:
        msg:
          - "Kong version: {{ kong_ver.stdout }}"
          - "Admin API: {{ kong_admin_url }}"
          - "Proxy: {{ kong_proxy_url }}"
          - "Mock root: HTTP {{ mock_root.status }}"
          - "Mock exact path: HTTP {{ mock_exact.status }}"
          - "No-auth through Kong: HTTP {{ noauth_probe.status }}"
          - "Authenticated through Kong: HTTP {{ e2e.status }}"
          - "API key: {{ test_api_key }}"
