---

* name: Full Kong Setup + Service + Route + Health Check
  hosts: localhost
  connection: local
  become: yes
  gather_facts: yes

  vars:
  kong_container_name: kong
  kong_image: kong:3.6

  tasks:

  * name: Update apt cache
    apt:
    update_cache: yes

  * name: Install required packages
    apt:
    name:
    - docker.io
    - python3-pip
    state: present

  * name: Install Docker Python module
    pip:
    name: docker

  * name: Start and enable Docker
    service:
    name: docker
    state: started
    enabled: yes

  * name: Remove old Kong container if exists
    community.docker.docker_container:
    name: "{{ kong_container_name }}"
    state: absent
    ignore_errors: yes

  * name: Pull Kong Docker image
    community.docker.docker_image:
    name: "{{ kong_image }}"
    source: pull

  * name: Run Kong container (DB-less mode)
    community.docker.docker_container:
    name: "{{ kong_container_name }}"
    image: "{{ kong_image }}"
    state: started
    restart_policy: always
    ports:
    - "8000:8000"
    - "8001:8001"
    env:
    KONG_DATABASE: "off"
    KONG_PROXY_ACCESS_LOG: /dev/stdout
    KONG_ADMIN_ACCESS_LOG: /dev/stdout
    KONG_PROXY_ERROR_LOG: /dev/stderr
    KONG_ADMIN_ERROR_LOG: /dev/stderr
    KONG_ADMIN_LISTEN: "0.0.0.0:8001"

  * name: Wait for Kong Admin API
    wait_for:
    host: localhost
    port: 8001
    delay: 5
    timeout: 60

  * name: Verify Kong is up
    uri:
    url: http://localhost:8001
    method: GET
    register: kong_status
    retries: 5
    delay: 5
    until: kong_status.status == 200

  # ---------------------------------------

  # Create a mock backend service

  # ---------------------------------------

  * name: Run mock backend (httpbin)
    community.docker.docker_container:
    name: httpbin
    image: kennethreitz/httpbin
    state: started
    ports:
    - "8080:80"

  * name: Wait for backend
    wait_for:
    host: localhost
    port: 8080
    timeout: 30

  # ---------------------------------------

  # Configure Kong (Service + Route)

  # ---------------------------------------

  * name: Create service in Kong
    uri:
    url: http://localhost:8001/services
    method: POST
    body_format: form-urlencoded
    body:
    name: httpbin-service
    url: http://host.docker.internal:8080
    status_code: 201

  * name: Create route in Kong
    uri:
    url: http://localhost:8001/services/httpbin-service/routes
    method: POST
    body_format: form-urlencoded
    body:
    paths[]: /test
    status_code: 201

  # ---------------------------------------

  # Health check via Kong proxy

  # ---------------------------------------

  * name: Wait before testing route
    pause:
    seconds: 5

  * name: Test Kong proxy endpoint
    uri:
    url: http://localhost:8000/test/get
    method: GET
    register: proxy_test
    retries: 5
    delay: 5
    until: proxy_test.status == 200

  * name: Show proxy response
    debug:
    var: proxy_test.status
