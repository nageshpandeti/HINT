#!/bin/bash
# ================================================================
# Kong API Gateway — Pre-flight + GitLab Run Script
#
# ORDER OF OPERATIONS:
#   1. Install libopenssl + zlib + libpcre (BEFORE anything else)
#   2. Install git + ansible + python3
#   3. Clone GitLab repo (feature/kong branch)
#   4. Run the ansible playbook from repo
#   5. Run full E2E test suite
#
# Usage (inside Ubuntu VM):
#   chmod +x preflight_and_run.sh
#   sudo ./preflight_and_run.sh
# ================================================================

set -euo pipefail

# ── Colors ──────────────────────────────────────────────────────
RED='\033[0;31m'
GREEN='\033[0;32m'
YELLOW='\033[1;33m'
CYAN='\033[0;36m'
BOLD='\033[1m'
NC='\033[0m'

log()     { echo -e "${GREEN}[✔]${NC} $1"; }
info()    { echo -e "${CYAN}[➜]${NC} $1"; }
warn()    { echo -e "${YELLOW}[!]${NC} $1"; }
error()   { echo -e "${RED}[✘] $1${NC}"; exit 1; }
section() { echo -e "\n${BOLD}${CYAN}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n   $1\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"; }

# ── Config ───────────────────────────────────────────────────────
GITLAB_REPO="https://gitlab.com/circles4/pods/oasis/sre/iac.git"
BRANCH="feature/kong"
CLONE_DIR="/opt/kong-iac"
ANSIBLE_DIR="${CLONE_DIR}/oasis/Kong/ansible"
KONG_ADMIN="http://localhost:8001"
KONG_PROXY="http://localhost:8000"
API_KEY="my-local-test-key-2024"
LOG_FILE="/tmp/kong-setup-$(date +%Y%m%d-%H%M%S).log"

# ================================================================
# ROOT CHECK
# ================================================================
[[ $EUID -ne 0 ]] && error "Run as root: sudo ./preflight_and_run.sh"

echo -e "${BOLD}${CYAN}"
cat <<'BANNER'
╔══════════════════════════════════════════════════════════════╗
║     Kong API Gateway — VirtualBox Ubuntu VM Setup           ║
║     GitLab: circles4/pods/oasis/sre/iac (feature/kong)      ║
╚══════════════════════════════════════════════════════════════╝
BANNER
echo -e "${NC}"

info "Full log: $LOG_FILE"
exec > >(tee -a "$LOG_FILE") 2>&1

OS=$(lsb_release -si 2>/dev/null || echo "Unknown")
VER=$(lsb_release -sr 2>/dev/null || echo "?")
CODENAME=$(lsb_release -sc 2>/dev/null || echo "?")
RAM=$(awk '/MemTotal/{print int($2/1024)}' /proc/meminfo)

log "OS: $OS $VER ($CODENAME) | RAM: ${RAM}MB"
[[ "$OS" != "Ubuntu" ]] && error "Ubuntu required. Detected: $OS"

# ================================================================
# PHASE 1 — APT CLEANUP (unlock + repair)
# ================================================================
section "PHASE 1: APT Cleanup"

info "Stopping background apt processes..."
killall apt apt-get unattended-upgrades dpkg 2>/dev/null || true
systemctl stop unattended-upgrades 2>/dev/null || true
systemctl disable unattended-upgrades 2>/dev/null || true
sleep 3

info "Removing ALL apt/dpkg lock files..."
rm -f /var/lib/dpkg/lock
rm -f /var/lib/dpkg/lock-frontend
rm -f /var/lib/apt/lists/lock
rm -f /var/cache/apt/archives/lock
rm -f /var/cache/debconf/config.dat.lock

info "Repairing dpkg state..."
dpkg --configure -a 2>&1 || true
apt-get install -f -y -qq 2>&1 | tail -3 || true

info "Removing broken/stale PPAs..."
rm -f /etc/apt/sources.list.d/rabbitmq*.list  2>/dev/null || true
rm -f /etc/apt/sources.list.d/rabbitmq*.sources 2>/dev/null || true
# remove stale Kong repo files so they don't conflict later
rm -f /etc/apt/sources.list.d/kong*.list     2>/dev/null || true
rm -f /etc/apt/sources.list.d/kong*.sources  2>/dev/null || true
rm -f /usr/share/keyrings/kong*.gpg          2>/dev/null || true
rm -f /usr/share/keyrings/kong*.asc          2>/dev/null || true
rm -f /etc/apt/trusted.gpg.d/kong*.gpg       2>/dev/null || true

info "Running apt-get update..."
export DEBIAN_FRONTEND=noninteractive
apt-get update -y 2>&1 | tail -8
log "APT cleanup done"

# ================================================================
# PHASE 2 — INSTALL KONG NATIVE DEPENDENCIES FIRST
# libopenssl, zlib, libpcre — BEFORE Kong and BEFORE Ansible
# ================================================================
section "PHASE 2: Kong Native Dependencies (libopenssl + zlib + libpcre)"

echo ""
echo -e "  Installing the following packages:"
echo -e "  ${BOLD}libopenssl${NC}  → libssl-dev openssl"
echo -e "  ${BOLD}zlib${NC}        → zlib1g zlib1g-dev"
echo -e "  ${BOLD}libpcre${NC}     → libpcre3 libpcre3-dev"
echo ""

DEBIAN_FRONTEND=noninteractive apt-get install -y \
    openssl \
    libssl-dev \
    zlib1g \
    zlib1g-dev \
    libpcre3 \
    libpcre3-dev \
    2>&1 | tail -5

# ── Verify each one ──────────────────────────────────────────
echo ""
info "Verifying installations..."

# libopenssl
if dpkg -l libssl-dev 2>/dev/null | grep -q "^ii"; then
    OPENSSL_VER=$(openssl version 2>/dev/null || echo "unknown")
    log "libopenssl  ✔  $OPENSSL_VER"
else
    error "libopenssl (libssl-dev) installation FAILED"
fi

# zlib
if dpkg -l zlib1g 2>/dev/null | grep -q "^ii"; then
    ZLIB_VER=$(dpkg -l zlib1g | grep "^ii" | awk '{print $3}')
    log "zlib        ✔  $ZLIB_VER"
else
    error "zlib1g installation FAILED"
fi

# libpcre
if dpkg -l libpcre3 2>/dev/null | grep -q "^ii"; then
    PCRE_VER=$(dpkg -l libpcre3 | grep "^ii" | awk '{print $3}')
    log "libpcre     ✔  $PCRE_VER"
else
    error "libpcre3 installation FAILED"
fi

echo ""
log "All Kong native dependencies installed and verified"

# ================================================================
# PHASE 3 — INSTALL GIT + ANSIBLE + PYTHON3
# ================================================================
section "PHASE 3: Install Git + Ansible + Python3"

DEBIAN_FRONTEND=noninteractive apt-get install -y \
    git \
    ansible \
    python3 \
    python3-pip \
    python3-psycopg2 \
    curl \
    gnupg \
    gnupg2 \
    apt-transport-https \
    ca-certificates \
    lsb-release \
    perl \
    procps \
    net-tools \
    unzip \
    2>&1 | tail -5

log "Git version   : $(git --version)"
log "Ansible       : $(ansible --version | head -1)"
log "Python3       : $(python3 --version)"

info "Installing Ansible postgresql collection..."
ansible-galaxy collection install community.postgresql --force -q 2>&1 | tail -3 || true
log "Ansible ready"

# ================================================================
# PHASE 4 — CLONE GITLAB REPO
# ================================================================
section "PHASE 4: Clone GitLab Repo (feature/kong)"

info "Checking internet..."
curl -sI https://gitlab.com --max-time 8 | head -1 || error "No internet. VirtualBox → Network → NAT"

if [[ -d "$CLONE_DIR/.git" ]]; then
    info "Repo already exists at $CLONE_DIR — pulling latest..."
    cd "$CLONE_DIR"
    git fetch origin 2>&1 | tail -3
    git checkout "$BRANCH" 2>/dev/null || \
        git checkout -b "$BRANCH" "origin/$BRANCH" 2>&1 | tail -3
    git pull origin "$BRANCH" 2>&1 | tail -3
    log "Repo updated"
else
    info "Cloning $GITLAB_REPO (branch: $BRANCH)..."
    git clone \
        --branch "$BRANCH" \
        --depth 1 \
        "$GITLAB_REPO" \
        "$CLONE_DIR" 2>&1 | tail -5
    log "Repo cloned to $CLONE_DIR"
fi

# ── Show repo structure ────────────────────────────────────
echo ""
info "Repo structure (oasis/Kong/):"
find "${CLONE_DIR}/oasis/Kong" -type f 2>/dev/null | sort | head -30 || \
    find "$CLONE_DIR" -name "*.yml" | head -20

# ── Verify ansible dir ────────────────────────────────────
if [[ ! -d "$ANSIBLE_DIR" ]]; then
    warn "Path not found: $ANSIBLE_DIR"
    info "Searching for ansible files in repo..."
    find "$CLONE_DIR" -name "*.yml" -not -path "*/.git/*" | head -20
    # Try to find the playbook anywhere in repo
    FOUND=$(find "$CLONE_DIR" -name "kong*.yml" -not -path "*/.git/*" | head -1)
    [[ -z "$FOUND" ]] && error "No Kong playbook found in repo. Check GitLab path."
    ANSIBLE_DIR=$(dirname "$FOUND")
    warn "Using detected ansible dir: $ANSIBLE_DIR"
fi

log "Ansible directory: $ANSIBLE_DIR"

# ================================================================
# PHASE 5 — RUN THE ANSIBLE PLAYBOOK FROM REPO
# ================================================================
section "PHASE 5: Run Ansible Playbook"

cd "$ANSIBLE_DIR"
info "Files in ansible dir:"
ls -la

# ── Auto-detect playbook ──────────────────────────────────
PLAYBOOK=""
for candidate in \
    kong_dbless.yml \
    kong_install.yml \
    kong.yml \
    site.yml \
    main.yml \
    install.yml \
    playbook.yml; do
    if [[ -f "$ANSIBLE_DIR/$candidate" ]]; then
        PLAYBOOK="$candidate"
        log "Playbook detected: $candidate"
        break
    fi
done

if [[ -z "$PLAYBOOK" ]]; then
    warn "No standard playbook name found — using first yml:"
    PLAYBOOK=$(find "$ANSIBLE_DIR" -maxdepth 1 -name "*.yml" \
        ! -name "requirements*" ! -name "vars*" | head -1)
    [[ -z "$PLAYBOOK" ]] && error "No .yml playbook found in $ANSIBLE_DIR"
    PLAYBOOK=$(basename "$PLAYBOOK")
fi

info "Running: ansible-playbook $PLAYBOOK -v"
echo ""

# ── Check for requirements file ───────────────────────────
if [[ -f "$ANSIBLE_DIR/requirements.yml" ]]; then
    info "Installing galaxy requirements..."
    ansible-galaxy collection install -r requirements.yml 2>&1 | tail -5
fi

ansible-playbook "$PLAYBOOK" -v
PLAYBOOK_RC=$?

echo ""
if [[ $PLAYBOOK_RC -eq 0 ]]; then
    log "Playbook completed successfully (exit code 0)"
else
    warn "Playbook exited with code $PLAYBOOK_RC — continuing to tests..."
fi

# ================================================================
# PHASE 6 — WAIT FOR KONG
# ================================================================
section "PHASE 6: Wait for Kong to be Ready"

info "Waiting for Kong Admin API on port 8001 (up to 60s)..."
for i in $(seq 1 20); do
    HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
        --max-time 3 "$KONG_ADMIN" 2>/dev/null || echo "000")
    if [[ "$HTTP" == "200" ]]; then
        log "Kong Admin API is UP — HTTP 200"
        break
    fi
    printf "  [%2d/20] HTTP %s — waiting 3s...\n" "$i" "$HTTP"
    sleep 3
done

FINAL=$(curl -s -o /dev/null -w "%{http_code}" \
    --max-time 5 "$KONG_ADMIN" 2>/dev/null || echo "000")
[[ "$FINAL" != "200" ]] && \
    error "Kong not responding after 60s. Run: journalctl -u kong -n 50"

# ================================================================
# PHASE 7 — E2E TEST SUITE
# ================================================================
section "PHASE 7: E2E Test Suite"

PASS=0
FAIL=0
declare -a RESULTS=()

t() {
    # t NAME URL EXPECTED_HTTP [HEADER]
    local NAME="$1" URL="$2" EXP="$3"
    local HDR="${4:-}"
    local CURL_CMD="curl -s -o /tmp/kong_resp.txt -w '%{http_code}' \
        --max-time 12 --connect-timeout 5"
    [[ -n "$HDR" ]] && CURL_CMD+=" -H '$HDR'"
    CURL_CMD+=" '$URL'"
    local GOT
    GOT=$(eval $CURL_CMD 2>/dev/null | tr -d "'" || echo "000")
    if [[ "$GOT" == "$EXP" ]]; then
        log "PASS  [$NAME]  HTTP $GOT"
        PASS=$((PASS+1))
        RESULTS+=("${GREEN}✔${NC} $NAME — HTTP $GOT")
    else
        warn "FAIL  [$NAME]  HTTP $GOT (expected $EXP)"
        FAIL=$((FAIL+1))
        RESULTS+=("${RED}✘${NC} $NAME — HTTP $GOT (expected $EXP)")
        [[ -f /tmp/kong_resp.txt ]] && \
            echo "    Response: $(cat /tmp/kong_resp.txt | head -3)"
    fi
}

# ── Get Kong info ─────────────────────────────────────────
KONG_VER=$(curl -s "$KONG_ADMIN" | \
    python3 -c "import sys,json; \
    d=json.load(sys.stdin); \
    print(d.get('version','?'))" 2>/dev/null || echo "?")

DB_MODE=$(curl -s "$KONG_ADMIN" | \
    python3 -c "import sys,json; \
    d=json.load(sys.stdin); \
    print(d.get('configuration',{}).get('database','?'))" \
    2>/dev/null || echo "?")

log "Kong version : $KONG_VER"
log "Database     : $DB_MODE $([ "$DB_MODE" = "off" ] && echo "(DB-Less ✔)" || echo "")"

# ── Auto-detect route path ────────────────────────────────
ROUTE_PATH=$(curl -s "$KONG_ADMIN/routes" 2>/dev/null | \
    python3 -c "
import sys, json
try:
    data = json.load(sys.stdin).get('data', [])
    if data and data[0].get('paths'):
        print(data[0]['paths'][0])
    else:
        print('/test-api')
except:
    print('/test-api')
" 2>/dev/null || echo "/test-api")
log "Route path   : $ROUTE_PATH"

echo ""
info "Running tests..."
echo ""

# Test 1: Admin API
t "Admin API health" \
    "$KONG_ADMIN" \
    "200"

# Test 2: Services loaded
SVC_COUNT=$(curl -s "$KONG_ADMIN/services" | \
    python3 -c "import sys,json; \
    print(len(json.load(sys.stdin).get('data',[])))" \
    2>/dev/null || echo "0")
if [[ "$SVC_COUNT" -gt 0 ]]; then
    log "Services configured: $SVC_COUNT"
    PASS=$((PASS+1))
    RESULTS+=("${GREEN}✔${NC} Services loaded — $SVC_COUNT found")
    curl -s "$KONG_ADMIN/services" | \
        python3 -c "import sys,json; \
        [print('    -', s['name'], '→', s.get('host','?')) \
        for s in json.load(sys.stdin)['data']]" 2>/dev/null || true
else
    warn "No services found"
    FAIL=$((FAIL+1))
    RESULTS+=("${RED}✘${NC} No services configured")
fi

# Test 3: Routes loaded
ROUTE_COUNT=$(curl -s "$KONG_ADMIN/routes" | \
    python3 -c "import sys,json; \
    print(len(json.load(sys.stdin).get('data',[])))" \
    2>/dev/null || echo "0")
if [[ "$ROUTE_COUNT" -gt 0 ]]; then
    log "Routes configured: $ROUTE_COUNT"
    PASS=$((PASS+1))
    RESULTS+=("${GREEN}✔${NC} Routes loaded — $ROUTE_COUNT found")
    curl -s "$KONG_ADMIN/routes" | \
        python3 -c "import sys,json; \
        [print('    -', r.get('name','?'), r.get('paths',[])) \
        for r in json.load(sys.stdin)['data']]" 2>/dev/null || true
else
    warn "No routes found"
    FAIL=$((FAIL+1))
    RESULTS+=("${RED}✘${NC} No routes configured")
fi

# Test 4: Plugins
PLUGIN_LIST=$(curl -s "$KONG_ADMIN/plugins" | \
    python3 -c "import sys,json; \
    print(', '.join([p['name'] \
    for p in json.load(sys.stdin).get('data',[])]))" \
    2>/dev/null || echo "none")
log "Active plugins: $PLUGIN_LIST"
RESULTS+=("${CYAN}~${NC} Plugins: $PLUGIN_LIST")

# Test 5: Mock backend
t "Mock backend :9090" \
    "http://localhost:9090/health" \
    "200"

# Test 6: Unauthenticated (expect 401)
t "No API key → 401" \
    "${KONG_PROXY}${ROUTE_PATH}/hello" \
    "401"

# Test 7: Authenticated (expect 200)
t "API key → 200" \
    "${KONG_PROXY}${ROUTE_PATH}/hello" \
    "200" \
    "apikey: $API_KEY"

# Test 8: Try admin key as well
t "Admin key → 200" \
    "${KONG_PROXY}${ROUTE_PATH}/hello" \
    "200" \
    "apikey: admin-secret-key-2024"

# Test 9: Kong systemd service
SVC_ACTIVE=$(systemctl is-active kong 2>/dev/null || echo "unknown")
if [[ "$SVC_ACTIVE" == "active" ]]; then
    log "Kong systemd: active"
    PASS=$((PASS+1))
    RESULTS+=("${GREEN}✔${NC} Kong systemd service active")
else
    warn "Kong systemd: $SVC_ACTIVE"
    RESULTS+=("${YELLOW}!${NC} Kong systemd: $SVC_ACTIVE")
fi

# Test 10: Rate-limit headers
RL=$(curl -s -I --max-time 8 \
    -H "apikey: $API_KEY" \
    "${KONG_PROXY}${ROUTE_PATH}/hello" 2>/dev/null | \
    grep -i "ratelimit" | head -2 || echo "")
if [[ -n "$RL" ]]; then
    log "Rate-limit headers: $(echo "$RL" | tr '\n' ' ' | xargs)"
    PASS=$((PASS+1))
    RESULTS+=("${GREEN}✔${NC} Rate-limit headers present")
else
    RESULTS+=("${YELLOW}~${NC} Rate-limit headers absent")
fi

# Test 11: DB-Less mode confirmed
if [[ "$DB_MODE" == "off" ]]; then
    log "DB-Less mode confirmed"
    PASS=$((PASS+1))
    RESULTS+=("${GREEN}✔${NC} DB-Less mode (database=off)")
else
    RESULTS+=("${YELLOW}~${NC} Database mode: $DB_MODE")
fi

# Test 12: Native deps verified in running process
KONG_LIBS=$(ldd "$(which kong)" 2>/dev/null | \
    grep -E "ssl|z\.|pcre" | \
    awk '{print $1}' | tr '\n' ' ' || echo "cannot verify")
log "Kong linked libs: $KONG_LIBS"
RESULTS+=("${CYAN}~${NC} Kong libs: $KONG_LIBS")

# ================================================================
# PHASE 8 — FINAL REPORT
# ================================================================
section "PHASE 8: Final Report"

echo ""
echo -e "${BOLD}Test Results:${NC}"
echo ""
for r in "${RESULTS[@]}"; do
    echo -e "   $r"
done

TOTAL=$((PASS + FAIL))
echo ""
if [[ $FAIL -eq 0 ]]; then
    echo -e "${BOLD}${GREEN}"
    echo "╔══════════════════════════════════════════════════════════════╗"
    echo "║       ALL TESTS PASSED ($PASS/$TOTAL) — Kong is fully working!    ║"
    echo "╚══════════════════════════════════════════════════════════════╝"
    echo -e "${NC}"
else
    echo -e "${BOLD}${YELLOW}"
    echo "╔══════════════════════════════════════════════════════════════╗"
    echo "║       $PASS/$TOTAL tests passed  |  $FAIL failed                        ║"
    echo "╚══════════════════════════════════════════════════════════════╝"
    echo -e "${NC}"
fi

echo -e "${BOLD}Summary:${NC}"
printf "  %-20s %s\n" "Kong version:"   "$KONG_VER"
printf "  %-20s %s\n" "Database mode:"  "$DB_MODE $([ "$DB_MODE" = "off" ] && echo "(DB-Less)")"
printf "  %-20s %s\n" "Route path:"     "$ROUTE_PATH"
printf "  %-20s %s\n" "libopenssl:"     "$(openssl version 2>/dev/null | awk '{print $2}')"
printf "  %-20s %s\n" "zlib:"           "$(dpkg -l zlib1g 2>/dev/null | grep '^ii' | awk '{print $3}')"
printf "  %-20s %s\n" "libpcre:"        "$(dpkg -l libpcre3 2>/dev/null | grep '^ii' | awk '{print $3}')"
printf "  %-20s %s\n" "Setup log:"      "$LOG_FILE"

echo ""
echo -e "${CYAN}${BOLD}Quick test commands:${NC}"
echo "  curl -i ${KONG_PROXY}${ROUTE_PATH}/hello -H 'apikey: $API_KEY'"
echo "  curl -i ${KONG_PROXY}${ROUTE_PATH}/hello                          # no key → 401"
echo "  curl -s $KONG_ADMIN | python3 -m json.tool                        # admin info"
echo "  sudo kong reload -c /etc/kong/kong.conf                           # reload config"
echo "  sudo nano /etc/kong/kong.yml                                       # edit config"
echo "  systemctl status kong                                              # service status"
echo "  journalctl -u kong -f                                             # live logs"
echo ""
echo -e "Full setup log saved to: ${BOLD}$LOG_FILE${NC}"
