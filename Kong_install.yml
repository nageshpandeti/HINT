---
# ============================================================
# Kong API Gateway — Complete Single-File Ansible Playbook
# Ubuntu 22.04 (Jammy) — apt shell + lock fixes applied
# ============================================================
#
# STEP 0 — Run in terminal BEFORE playbook (clears apt locks):
#
#   sudo killall apt apt-get unattended-upgrades 2>/dev/null; true
#   sudo rm -f /var/lib/dpkg/lock* /var/lib/apt/lists/lock /var/cache/apt/archives/lock
#   sudo dpkg --configure -a
#   sudo apt-get update
#
# STEP 1 — Run the playbook:
#
#   ansible-playbook Kong_install.yml -v
#
# ============================================================

- name: Kong API Gateway — Install and Test
  hosts: localhost
  connection: local
  become: true
  become_method: sudo
  gather_facts: true

  vars:
    pg_user:           kong
    pg_password:       "KongSecret@2024"
    pg_db:             kong
    pg_host:           "127.0.0.1"
    pg_port:           5432
    kong_conf:         /etc/kong/kong.conf
    kong_proxy_port:   8000
    kong_admin_port:   8001
    kong_manager_port: 8002
    kong_admin_url:    "http://localhost:8001"
    kong_proxy_url:    "http://localhost:8000"
    kong_gpg_url:      "https://packages.konghq.com/public/gateway-39/gpg.E7ECF02AC16C5DB8.key"
    kong_repo_url:     "https://packages.konghq.com/public/gateway-39/config.deb.txt"
    kong_keyring:      "/usr/share/keyrings/kong-gateway-39-archive-keyring.gpg"
    kong_sources:      "/etc/apt/sources.list.d/kong-gateway-39.list"
    svc_name:          httpbin-service
    svc_url:           "https://httpbin.org"
    route_path:        /test-api
    test_api_key:      "my-local-test-key-2024"

  pre_tasks:

    - name: Assert Ubuntu
      assert:
        that: ansible_distribution == "Ubuntu"
        fail_msg: "Requires Ubuntu. Found: {{ ansible_distribution }}"
      tags: always

    - name: System info
      debug:
        msg: "Ubuntu {{ ansible_distribution_version }} ({{ ansible_distribution_release }}) | RAM {{ ansible_memtotal_mb }}MB"
      tags: always

    # ── Kill background apt processes ──────────────────────────
    - name: "PRE | Kill apt background processes"
      shell: |
        killall apt apt-get unattended-upgrades dpkg 2>/dev/null || true
        systemctl stop unattended-upgrades 2>/dev/null || true
        sleep 3
      changed_when: false
      tags: always

    # ── Remove ALL lock files ──────────────────────────────────
    - name: "PRE | Remove all apt/dpkg lock files"
      shell: |
        rm -f /var/lib/dpkg/lock
        rm -f /var/lib/dpkg/lock-frontend
        rm -f /var/lib/apt/lists/lock
        rm -f /var/cache/apt/archives/lock
        rm -f /var/cache/debconf/config.dat.lock
      changed_when: false
      tags: always

    # ── Repair dpkg ────────────────────────────────────────────
    - name: "PRE | Repair dpkg state"
      shell: |
        dpkg --configure -a 2>&1 || true
        apt-get install -f -y 2>&1 || true
      changed_when: false
      tags: always

    # ── Back up any broken third-party sources ─────────────────
    - name: "PRE | Back up non-Ubuntu apt source lists"
      shell: |
        for f in /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
          [ -f "$f" ] || continue
          fname=$(basename "$f")
          if [[ "$fname" != *"ubuntu"* && "$fname" != *"jammy"* ]]; then
            mv "$f" "${f}.bak" 2>/dev/null && echo "Backed up $f" || true
          fi
        done
      changed_when: false
      tags: always

    # ── apt-get update via SHELL (avoids Ansible apt module bug) ─
    - name: "PRE | Run apt-get update (shell)"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -y 2>&1
      register: apt_update_out
      changed_when: false
      failed_when: false
      tags: always

    - name: "PRE | Last 8 lines of apt update output"
      debug:
        msg: "{{ apt_update_out.stdout_lines | default([]) | last(8) }}"
      tags: always

    # ── Check network if apt update failed ────────────────────
    - name: "PRE | Check internet connectivity"
      shell: curl -sI https://archive.ubuntu.com --max-time 8 | head -1
      register: net_check
      changed_when: false
      failed_when: false
      tags: always

    - name: "PRE | Network status"
      debug:
        msg: "{{ net_check.stdout if net_check.stdout != '' else 'WARNING — Cannot reach archive.ubuntu.com. Check VM Network Adapter (NAT/Bridged) in VirtualBox settings!' }}"
      tags: always

    - name: "PRE | Fail if apt update had critical error AND network is down"
      fail:
        msg: |
          apt-get update failed AND no internet.
          FIX IN VIRTUALBOX: Settings -> Network -> Adapter 1 -> Attached to: NAT
          Then restart the VM and re-run the playbook.
      when:
        - apt_update_out.rc != 0
        - net_check.rc != 0
      tags: always

  tasks:

    # ==========================================================
    # STEP 1 — PREREQUISITES
    # ==========================================================
    - name: "STEP 1 | Install system dependencies"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get install -y --no-install-recommends \
          curl gnupg apt-transport-https ca-certificates \
          lsb-release python3-psycopg2 2>&1
      register: prereq_out
      changed_when: "'0 newly installed' not in prereq_out.stdout"
      tags: [prereqs]

    - name: "STEP 1 | Prereqs done"
      debug:
        msg: "{{ prereq_out.stdout_lines | default([]) | last(4) }}"
      tags: [prereqs]

    # ==========================================================
    # STEP 2 — POSTGRESQL
    # ==========================================================
    - name: "STEP 2 | Install PostgreSQL"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get install -y postgresql postgresql-contrib 2>&1
      register: pg_out
      changed_when: "'0 newly installed' not in pg_out.stdout"
      tags: [postgres]

    - name: "STEP 2 | Start and enable PostgreSQL"
      service:
        name: postgresql
        state: started
        enabled: yes
      tags: [postgres]

    - name: "STEP 2 | Wait for PostgreSQL port 5432"
      wait_for:
        host: localhost
        port: 5432
        delay: 3
        timeout: 30
      tags: [postgres]

    - name: "STEP 2 | Create Kong DB user"
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ pg_user }}"
        password: "{{ pg_password }}"
        role_attr_flags: CREATEDB,LOGIN
        state: present
      tags: [postgres]

    - name: "STEP 2 | Create Kong database"
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ pg_db }}"
        owner: "{{ pg_user }}"
        encoding: UTF8
        state: present
      tags: [postgres]

    - name: "STEP 2 | Grant privileges"
      become_user: postgres
      community.postgresql.postgresql_privs:
        db: "{{ pg_db }}"
        role: "{{ pg_user }}"
        type: database
        privs: ALL
        state: present
      tags: [postgres]

    # ==========================================================
    # STEP 3 — INSTALL KONG
    # ==========================================================
    - name: "STEP 3 | Add Kong GPG key"
      shell: >
        curl -1sLf "{{ kong_gpg_url }}"
        | gpg --dearmor
        | tee {{ kong_keyring }} > /dev/null
      args:
        creates: "{{ kong_keyring }}"
      tags: [kong_install]

    - name: "STEP 3 | Add Kong APT repo"
      shell: >
        curl -1sLf
        "{{ kong_repo_url }}?distro=ubuntu&codename={{ ansible_distribution_release }}"
        | tee {{ kong_sources }} > /dev/null
      args:
        creates: "{{ kong_sources }}"
      tags: [kong_install]

    - name: "STEP 3 | apt update after Kong repo"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -y 2>&1
      changed_when: false
      tags: [kong_install]

    - name: "STEP 3 | Install Kong Gateway"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get install -y kong 2>&1
      register: kong_pkg
      changed_when: "'0 newly installed' not in kong_pkg.stdout"
      tags: [kong_install]

    - name: "STEP 3 | Verify kong binary"
      command: kong version
      register: kong_ver
      changed_when: false
      tags: [kong_install]

    - name: "STEP 3 | Kong version"
      debug:
        msg: "Installed → {{ kong_ver.stdout }}"
      tags: [kong_install]

    # ==========================================================
    # STEP 4 — CONFIGURE
    # ==========================================================
    - name: "STEP 4 | Copy default to active kong.conf"
      copy:
        src: /etc/kong/kong.conf.default
        dest: "{{ kong_conf }}"
        remote_src: yes
        force: no
        owner: root
        mode: "0644"
      tags: [configure]

    - name: "STEP 4 | Inject DB + listener config"
      blockinfile:
        path: "{{ kong_conf }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          database = postgres
          pg_host = {{ pg_host }}
          pg_port = {{ pg_port }}
          pg_user = {{ pg_user }}
          pg_password = {{ pg_password }}
          pg_database = {{ pg_db }}
          proxy_listen = 0.0.0.0:{{ kong_proxy_port }}
          admin_listen = 0.0.0.0:{{ kong_admin_port }}
          admin_gui_listen = 0.0.0.0:{{ kong_manager_port }}
      tags: [configure]

    # ==========================================================
    # STEP 5 — MIGRATIONS
    # ==========================================================
    - name: "STEP 5 | Bootstrap Kong DB"
      command: kong migrations bootstrap -c {{ kong_conf }}
      register: mig
      failed_when:
        - mig.rc != 0
        - "'already bootstrapped' not in (mig.stderr | default(''))"
      changed_when: "'already bootstrapped' not in (mig.stderr | default(''))"
      tags: [migrate, start]

    - name: "STEP 5 | Migration result"
      debug:
        msg: "{{ 'Already bootstrapped — skipped' if 'already bootstrapped' in (mig.stderr | default('')) else 'Migrations completed' }}"
      tags: [migrate, start]

    # ==========================================================
    # STEP 6 — SERVICE
    # ==========================================================
    - name: "STEP 6 | Create Kong systemd unit"
      copy:
        dest: /lib/systemd/system/kong.service
        owner: root
        mode: "0644"
        content: |
          [Unit]
          Description=Kong API Gateway
          After=network.target postgresql.service

          [Service]
          User=root
          Group=root
          Type=forking
          ExecStartPre=/usr/local/bin/kong prepare -p /usr/local/kong -c /etc/kong/kong.conf
          ExecStart=/usr/local/bin/kong start   -c /etc/kong/kong.conf
          ExecReload=/usr/local/bin/kong reload -c /etc/kong/kong.conf
          ExecStop=/usr/local/bin/kong stop
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target
      tags: [start]

    - name: "STEP 6 | Reload systemd + start Kong"
      systemd:
        name: kong
        daemon_reload: yes
        state: started
        enabled: yes
      tags: [start]

    - name: "STEP 6 | Wait for Admin API :8001"
      wait_for:
        host: localhost
        port: "{{ kong_admin_port }}"
        delay: 5
        timeout: 60
      tags: [start]

    - name: "STEP 6 | Wait for Proxy :8000"
      wait_for:
        host: localhost
        port: "{{ kong_proxy_port }}"
        delay: 2
        timeout: 30
      tags: [start]

    # ==========================================================
    # STEP 7 — HEALTH CHECK
    # ==========================================================
    - name: "STEP 7 | Admin API health"
      uri:
        url: "{{ kong_admin_url }}"
        method: GET
        status_code: 200
        return_content: yes
      register: health
      tags: [start, test, summary]

    - name: "STEP 7 | Kong healthy"
      debug:
        msg: "Kong v{{ health.json.version }} UP — proxy :{{ kong_proxy_port }} | admin :{{ kong_admin_port }}"
      tags: [start, test, summary]

    # ==========================================================
    # STEP 8–11 — SERVICE / ROUTE / PLUGINS / CONSUMER
    # ==========================================================
    - name: "STEP 8 | Create service → {{ svc_url }}"
      uri:
        url: "{{ kong_admin_url }}/services"
        method: POST
        body_format: json
        body: { name: "{{ svc_name }}", url: "{{ svc_url }}" }
        status_code: [200, 201, 409]
      tags: [test, setup]

    - name: "STEP 9 | Create route {{ route_path }}"
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/routes"
        method: POST
        body_format: json
        body: { name: test-route, paths: ["{{ route_path }}"], strip_path: false }
        status_code: [200, 201, 409]
      tags: [test, setup]

    - name: "STEP 10 | Rate-Limiting plugin"
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/plugins"
        method: POST
        body_format: json
        body: { name: rate-limiting, config: { minute: 10, policy: local } }
        status_code: [200, 201, 409]
      tags: [test, plugins]

    - name: "STEP 10 | Key-Auth plugin"
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/plugins"
        method: POST
        body_format: json
        body: { name: key-auth, config: { key_names: [apikey] } }
        status_code: [200, 201, 409]
      tags: [test, plugins]

    - name: "STEP 11 | Create consumer test-user"
      uri:
        url: "{{ kong_admin_url }}/consumers"
        method: POST
        body_format: json
        body: { username: test-user }
        status_code: [200, 201, 409]
      tags: [test, consumer]

    - name: "STEP 11 | Assign API key"
      uri:
        url: "{{ kong_admin_url }}/consumers/test-user/key-auth"
        method: POST
        body_format: json
        body: { key: "{{ test_api_key }}" }
        status_code: [200, 201, 409]
      tags: [test, consumer]

    # ==========================================================
    # STEP 12 — E2E TESTS
    # ==========================================================
    - name: "STEP 12 | Authenticated request (expect 200)"
      uri:
        url: "{{ kong_proxy_url }}{{ route_path }}/get"
        method: GET
        headers: { apikey: "{{ test_api_key }}" }
        status_code: 200
        timeout: 30
      register: e2e
      tags: [test, e2e]

    - name: "STEP 12 | E2E result"
      debug:
        msg: "PASSED — HTTP {{ e2e.status }} — proxied to {{ svc_url }}"
      tags: [test, e2e]

    - name: "STEP 12 | Unauthenticated (expect 401)"
      uri:
        url: "{{ kong_proxy_url }}{{ route_path }}/get"
        method: GET
        status_code: 401
        timeout: 10
      register: unauth
      tags: [test, e2e]

    - name: "STEP 12 | Auth enforcement"
      debug:
        msg: "Key-auth WORKING — blocked with HTTP {{ unauth.status }}"
      tags: [test, e2e]

    # ==========================================================
    # STEP 13 — SUMMARY
    # ==========================================================
    - name: "STEP 13 | FINAL SUMMARY"
      debug:
        msg: |

          ╔═══════════════════════════════════════════════════════╗
          ║       Kong API Gateway — All Systems Go!             ║
          ╠═══════════════════════════════════════════════════════╣
          ║  Version    : {{ health.json.version }}
          ║  Proxy      : http://localhost:{{ kong_proxy_port }}
          ║  Admin API  : http://localhost:{{ kong_admin_port }}
          ║  Manager UI : http://localhost:{{ kong_manager_port }}
          ╠═══════════════════════════════════════════════════════╣
          ║  QUICK TEST COMMANDS                                 ║
          ║                                                      ║
          ║  curl -i http://localhost:8000/test-api/get \        ║
          ║       -H "apikey: my-local-test-key-2024"           ║
          ║                                                      ║
          ║  curl -i http://localhost:8000/test-api/get          ║
          ║  (no key → expect 401)                               ║
          ║                                                      ║
          ║  curl -s http://localhost:8001 | python3 -m json.tool║
          ║  systemctl status kong                               ║
          ╚═══════════════════════════════════════════════════════╝
      tags: [test, summary]

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes
