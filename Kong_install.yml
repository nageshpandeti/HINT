---
# ============================================================
# Kong API Gateway — Complete Single-File Ansible Playbook
# ============================================================
#
# ⚠️  FIX from previous error:
#      OLD broken file had:  hosts: kong_servers  ← caused "no hosts matched"
#      THIS file uses:       hosts: localhost      ← runs on THIS machine
#                            connection: local     ← no SSH, no inventory needed
#
# STEP 0 — Prepare Ansible (run once):
#
#   sudo apt update && sudo apt install -y ansible python3-psycopg2
#   ansible-galaxy collection install community.postgresql
#
# STEP 1 — Run the full playbook:
#
#   ansible-playbook RUN_THIS_kong.yml -v
#
# STEP 2 — Run specific steps only:
#
#   ansible-playbook RUN_THIS_kong.yml --tags prereqs
#   ansible-playbook RUN_THIS_kong.yml --tags postgres
#   ansible-playbook RUN_THIS_kong.yml --tags kong_install
#   ansible-playbook RUN_THIS_kong.yml --tags configure
#   ansible-playbook RUN_THIS_kong.yml --tags start
#   ansible-playbook RUN_THIS_kong.yml --tags test
#   ansible-playbook RUN_THIS_kong.yml --tags e2e
#   ansible-playbook RUN_THIS_kong.yml --tags summary
# ============================================================

- name: Kong API Gateway — Install and Test
  hosts: localhost        # runs on THIS machine, no inventory file needed
  connection: local       # no SSH required
  become: true            # uses sudo
  gather_facts: true

  # ----------------------------------------------------------
  # ALL CONFIG — change values here if needed
  # ----------------------------------------------------------
  vars:
    pg_user:           kong
    pg_password:       "KongSecret@2024"
    pg_db:             kong
    pg_host:           "127.0.0.1"
    pg_port:           5432
    kong_conf:         /etc/kong/kong.conf
    kong_proxy_port:   8000
    kong_admin_port:   8001
    kong_manager_port: 8002
    kong_admin_url:    "http://localhost:8001"
    kong_proxy_url:    "http://localhost:8000"
    kong_gpg_url:      "https://packages.konghq.com/public/gateway-39/gpg.E7ECF02AC16C5DB8.key"
    kong_repo_url:     "https://packages.konghq.com/public/gateway-39/config.deb.txt"
    kong_keyring:      "/usr/share/keyrings/kong-gateway-39-archive-keyring.gpg"
    kong_sources:      "/etc/apt/sources.list.d/kong-gateway-39.list"
    svc_name:          httpbin-service
    svc_url:           "https://httpbin.org"
    route_path:        /test-api
    test_api_key:      "my-local-test-key-2024"

  # ----------------------------------------------------------
  pre_tasks:
    - name: Assert Ubuntu
      assert:
        that: ansible_distribution == "Ubuntu"
        fail_msg: "Requires Ubuntu. Found: {{ ansible_distribution }}"
      tags: always

    - name: System info
      debug:
        msg: "Ubuntu {{ ansible_distribution_version }} ({{ ansible_distribution_release }}) | RAM {{ ansible_memtotal_mb }}MB"
      tags: always

  # ----------------------------------------------------------
  tasks:

    # ==========================================================
    # STEP 1 — PREREQUISITES
    # ==========================================================
    - name: "STEP 1 | apt update"
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: [prereqs]

    - name: "STEP 1 | Install system dependencies"
      apt:
        name:
          - curl
          - gnupg
          - apt-transport-https
          - ca-certificates
          - lsb-release
          - python3-psycopg2
        state: present
      tags: [prereqs]

    # ==========================================================
    # STEP 2 — POSTGRESQL
    # ==========================================================
    - name: "STEP 2 | Install PostgreSQL"
      apt:
        name:
          - postgresql
          - postgresql-contrib
        state: present
      tags: [postgres]

    - name: "STEP 2 | Start and enable PostgreSQL"
      service:
        name: postgresql
        state: started
        enabled: yes
      tags: [postgres]

    - name: "STEP 2 | Create Kong DB user"
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ pg_user }}"
        password: "{{ pg_password }}"
        role_attr_flags: CREATEDB,LOGIN
        state: present
      tags: [postgres]

    - name: "STEP 2 | Create Kong database"
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ pg_db }}"
        owner: "{{ pg_user }}"
        encoding: UTF8
        state: present
      tags: [postgres]

    - name: "STEP 2 | Grant all privileges"
      become_user: postgres
      community.postgresql.postgresql_privs:
        db: "{{ pg_db }}"
        role: "{{ pg_user }}"
        type: database
        privs: ALL
        state: present
      tags: [postgres]

    # ==========================================================
    # STEP 3 — INSTALL KONG
    # ==========================================================
    - name: "STEP 3 | Add Kong GPG key"
      shell: >
        curl -1sLf "{{ kong_gpg_url }}"
        | gpg --dearmor
        | tee {{ kong_keyring }} > /dev/null
      args:
        creates: "{{ kong_keyring }}"
      tags: [kong_install]

    - name: "STEP 3 | Add Kong APT repo"
      shell: >
        curl -1sLf
        "{{ kong_repo_url }}?distro=ubuntu&codename={{ ansible_distribution_release }}"
        | tee {{ kong_sources }} > /dev/null
      args:
        creates: "{{ kong_sources }}"
      tags: [kong_install]

    - name: "STEP 3 | apt update after new repo"
      apt:
        update_cache: yes
      tags: [kong_install]

    - name: "STEP 3 | Install Kong Gateway OSS"
      apt:
        name: kong
        state: present
      tags: [kong_install]

    - name: "STEP 3 | Verify kong binary"
      command: kong version
      register: kong_ver
      changed_when: false
      tags: [kong_install]

    - name: "STEP 3 | Show Kong version"
      debug:
        msg: "Installed: {{ kong_ver.stdout }}"
      tags: [kong_install]

    # ==========================================================
    # STEP 4 — CONFIGURE kong.conf
    # ==========================================================
    - name: "STEP 4 | Copy default to active kong.conf"
      copy:
        src: /etc/kong/kong.conf.default
        dest: "{{ kong_conf }}"
        remote_src: yes
        force: no
        owner: root
        mode: "0644"
      tags: [configure]

    - name: "STEP 4 | Inject DB + listener settings"
      blockinfile:
        path: "{{ kong_conf }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          database = postgres
          pg_host = {{ pg_host }}
          pg_port = {{ pg_port }}
          pg_user = {{ pg_user }}
          pg_password = {{ pg_password }}
          pg_database = {{ pg_db }}
          proxy_listen = 0.0.0.0:{{ kong_proxy_port }}
          admin_listen = 0.0.0.0:{{ kong_admin_port }}
          admin_gui_listen = 0.0.0.0:{{ kong_manager_port }}
      tags: [configure]

    # ==========================================================
    # STEP 5 — DB MIGRATIONS
    # ==========================================================
    - name: "STEP 5 | Bootstrap Kong database"
      command: kong migrations bootstrap -c {{ kong_conf }}
      register: mig
      failed_when:
        - mig.rc != 0
        - "'already bootstrapped' not in (mig.stderr | default(''))"
      changed_when: "'already bootstrapped' not in (mig.stderr | default(''))"
      tags: [migrate, start]

    - name: "STEP 5 | Migration result"
      debug:
        msg: "{{ 'Already bootstrapped — skipped' if 'already bootstrapped' in (mig.stderr | default('')) else 'Migrations completed successfully' }}"
      tags: [migrate, start]

    # ==========================================================
    # STEP 6 — SYSTEMD SERVICE
    # ==========================================================
    - name: "STEP 6 | Create Kong systemd unit file"
      copy:
        dest: /lib/systemd/system/kong.service
        owner: root
        mode: "0644"
        content: |
          [Unit]
          Description=Kong API Gateway
          After=network.target postgresql.service

          [Service]
          User=root
          Group=root
          Type=forking
          ExecStartPre=/usr/local/bin/kong prepare -p /usr/local/kong -c /etc/kong/kong.conf
          ExecStart=/usr/local/bin/kong start   -c /etc/kong/kong.conf
          ExecReload=/usr/local/bin/kong reload -c /etc/kong/kong.conf
          ExecStop=/usr/local/bin/kong stop
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target
      tags: [start]

    - name: "STEP 6 | Reload systemd daemon"
      systemd:
        daemon_reload: yes
      tags: [start]

    - name: "STEP 6 | Start and enable Kong"
      service:
        name: kong
        state: started
        enabled: yes
      tags: [start]

    - name: "STEP 6 | Wait for Admin API port 8001"
      wait_for:
        host: localhost
        port: "{{ kong_admin_port }}"
        delay: 5
        timeout: 60
      tags: [start]

    - name: "STEP 6 | Wait for Proxy port 8000"
      wait_for:
        host: localhost
        port: "{{ kong_proxy_port }}"
        delay: 2
        timeout: 30
      tags: [start]

    # ==========================================================
    # STEP 7 — HEALTH CHECK
    # ==========================================================
    - name: "STEP 7 | Admin API health check"
      uri:
        url: "{{ kong_admin_url }}"
        method: GET
        status_code: 200
        return_content: yes
        timeout: 10
      register: health
      tags: [start, test, summary]

    - name: "STEP 7 | Kong healthy"
      debug:
        msg: "Kong v{{ health.json.version }} is UP — proxy :{{ kong_proxy_port }} | admin :{{ kong_admin_port }}"
      tags: [start, test, summary]

    # ==========================================================
    # STEP 8 — CREATE SERVICE
    # ==========================================================
    - name: "STEP 8 | Create service pointing to httpbin"
      uri:
        url: "{{ kong_admin_url }}/services"
        method: POST
        body_format: json
        body:
          name: "{{ svc_name }}"
          url: "{{ svc_url }}"
        status_code: [200, 201, 409]
      register: svc_result
      tags: [test, setup]

    - name: "STEP 8 | Service result"
      debug:
        msg: "'{{ svc_name }}' created (HTTP {{ svc_result.status }})"
      tags: [test, setup]

    # ==========================================================
    # STEP 9 — CREATE ROUTE
    # ==========================================================
    - name: "STEP 9 | Create route {{ route_path }}"
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/routes"
        method: POST
        body_format: json
        body:
          name: test-route
          paths:
            - "{{ route_path }}"
          strip_path: false
        status_code: [200, 201, 409]
      register: route_result
      tags: [test, setup]

    - name: "STEP 9 | Route result"
      debug:
        msg: "Route '{{ route_path }}' created (HTTP {{ route_result.status }})"
      tags: [test, setup]

    # ==========================================================
    # STEP 10 — PLUGINS
    # ==========================================================
    - name: "STEP 10 | Add Rate-Limiting plugin (10 req/min)"
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/plugins"
        method: POST
        body_format: json
        body:
          name: rate-limiting
          config:
            minute: 10
            policy: local
        status_code: [200, 201, 409]
      tags: [test, plugins]

    - name: "STEP 10 | Add Key-Auth plugin"
      uri:
        url: "{{ kong_admin_url }}/services/{{ svc_name }}/plugins"
        method: POST
        body_format: json
        body:
          name: key-auth
          config:
            key_names:
              - apikey
        status_code: [200, 201, 409]
      tags: [test, plugins]

    # ==========================================================
    # STEP 11 — CONSUMER + API KEY
    # ==========================================================
    - name: "STEP 11 | Create test consumer"
      uri:
        url: "{{ kong_admin_url }}/consumers"
        method: POST
        body_format: json
        body:
          username: test-user
        status_code: [200, 201, 409]
      tags: [test, consumer]

    - name: "STEP 11 | Assign API key to test-user"
      uri:
        url: "{{ kong_admin_url }}/consumers/test-user/key-auth"
        method: POST
        body_format: json
        body:
          key: "{{ test_api_key }}"
        status_code: [200, 201, 409]
      tags: [test, consumer]

    # ==========================================================
    # STEP 12 — END-TO-END PROXY TESTS
    # ==========================================================
    - name: "STEP 12 | E2E test — authenticated request (expect 200)"
      uri:
        url: "{{ kong_proxy_url }}{{ route_path }}/get"
        method: GET
        headers:
          apikey: "{{ test_api_key }}"
        status_code: 200
        timeout: 30
      register: e2e
      tags: [test, e2e]

    - name: "STEP 12 | E2E result"
      debug:
        msg: "PASSED — HTTP {{ e2e.status }} — Kong proxied to {{ svc_url }} successfully"
      tags: [test, e2e]

    - name: "STEP 12 | Auth test — no key (expect 401)"
      uri:
        url: "{{ kong_proxy_url }}{{ route_path }}/get"
        method: GET
        status_code: 401
        timeout: 10
      register: unauth
      tags: [test, e2e]

    - name: "STEP 12 | Auth enforcement result"
      debug:
        msg: "Key-auth WORKING — unauthenticated request blocked with HTTP {{ unauth.status }}"
      tags: [test, e2e]

    # ==========================================================
    # STEP 13 — FINAL SUMMARY
    # ==========================================================
    - name: "STEP 13 | Fetch all services"
      uri:
        url: "{{ kong_admin_url }}/services"
        return_content: yes
      register: all_svc
      tags: [test, summary]

    - name: "STEP 13 | Fetch all routes"
      uri:
        url: "{{ kong_admin_url }}/routes"
        return_content: yes
      register: all_routes
      tags: [test, summary]

    - name: "STEP 13 | Fetch all plugins"
      uri:
        url: "{{ kong_admin_url }}/plugins"
        return_content: yes
      register: all_plugins
      tags: [test, summary]

    - name: "STEP 13 | FINAL SUMMARY"
      debug:
        msg: |

          ╔═══════════════════════════════════════════════════════════╗
          ║         Kong API Gateway — All Systems Go!               ║
          ╠═══════════════════════════════════════════════════════════╣
          ║  Version    : {{ health.json.version }}
          ║  Proxy      : http://localhost:{{ kong_proxy_port }}
          ║  Admin API  : http://localhost:{{ kong_admin_port }}
          ║  Manager UI : http://localhost:{{ kong_manager_port }}
          ╠═══════════════════════════════════════════════════════════╣
          ║  Services : {{ all_svc.json.data | map(attribute='name') | list }}
          ║  Routes   : {{ all_routes.json.data | map(attribute='name') | list }}
          ║  Plugins  : {{ all_plugins.json.data | map(attribute='name') | list }}
          ╠═══════════════════════════════════════════════════════════╣
          ║  QUICK TEST COMMANDS                                     ║
          ║                                                          ║
          ║  # Authenticated request (expect 200)                   ║
          ║  curl -i http://localhost:8000/test-api/get \           ║
          ║       -H "apikey: my-local-test-key-2024"              ║
          ║                                                          ║
          ║  # No key (expect 401)                                  ║
          ║  curl -i http://localhost:8000/test-api/get             ║
          ║                                                          ║
          ║  # Admin health                                         ║
          ║  curl -s http://localhost:8001 | python3 -m json.tool   ║
          ║                                                          ║
          ║  systemctl status kong                                  ║
          ║  journalctl -u kong -f                                  ║
          ╚═══════════════════════════════════════════════════════════╝
      tags: [test, summary]

  # ----------------------------------------------------------
  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes
