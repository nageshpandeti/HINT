---
# ================================================================
# FILE : kong_ansible.yml
# RUN  : ansible-playbook kong_ansible.yml -v
#
# WHAT IT DOES (No Database Required):
#   1.  Verify libopenssl + zlib + libpcre are present
#   2.  Install Kong (skips if already installed)
#   3.  Start a local Python mock backend on port 9090
#   4.  Write kong.conf  → database = off  (DB-Less mode)
#   5.  Write kong.yml   → services / routes / consumers / plugins
#   6.  Validate declarative config syntax
#   7.  Start Kong via systemd
#   8.  Health-check Admin API
#   9.  Run E2E tests  (401 no-key / 200 with key / rate-limit)
#   10. Print final summary
# ================================================================

- name: Kong API Gateway — DB-Less Install and Test
  hosts: localhost
  connection: local
  become: true
  become_method: sudo
  gather_facts: true

  # ── variables ──────────────────────────────────────────────
  vars:
    kong_conf:         /etc/kong/kong.conf
    kong_yml:          /etc/kong/kong.yml
    kong_proxy_port:   8000
    kong_admin_port:   8001
    kong_admin_url:    "http://localhost:8001"
    kong_proxy_url:    "http://localhost:8000"
    mock_port:         9090
    api_key:           "my-local-test-key-2024"
    admin_key:         "admin-secret-key-2024"

  # ============================================================
  pre_tasks:

    - name: System info
      debug:
        msg: >
          Ubuntu {{ ansible_distribution_version }}
          ({{ ansible_distribution_release }}) |
          RAM {{ ansible_memtotal_mb }}MB |
          Disk free {{ ansible_mounts
            | selectattr('mount','equalto','/')
            | map(attribute='size_available')
            | first
            | int // 1073741824 }}GB
      tags: always

    # ── verify all three native deps are present ─────────────
    - name: "PRE | Verify libopenssl installed"
      shell: dpkg -l libssl-dev | grep "^ii"
      register: chk_ssl
      changed_when: false
      failed_when: chk_ssl.rc != 0
      tags: always

    - name: "PRE | Verify zlib installed"
      shell: dpkg -l zlib1g | grep "^ii"
      register: chk_zlib
      changed_when: false
      failed_when: chk_zlib.rc != 0
      tags: always

    - name: "PRE | Verify libpcre installed"
      shell: dpkg -l libpcre3 | grep "^ii"
      register: chk_pcre
      changed_when: false
      failed_when: chk_pcre.rc != 0
      tags: always

    - name: "PRE | All native deps verified"
      debug:
        msg:
          - "libopenssl : {{ chk_ssl.stdout.split()[2] }}"
          - "zlib       : {{ chk_zlib.stdout.split()[2] }}"
          - "libpcre    : {{ chk_pcre.stdout.split()[2] }}"
      tags: always

  # ============================================================
  tasks:

    # ==========================================================
    # STEP 1 — INSTALL KONG (skip if already present)
    # ==========================================================
    - name: "STEP 1 | Check if Kong already installed"
      command: which kong
      register: kong_bin
      changed_when: false
      failed_when: false
      tags: [install]

    - name: "STEP 1 | Kong already installed — show version"
      command: kong version
      register: kong_existing_ver
      changed_when: false
      when: kong_bin.rc == 0
      tags: [install]

    - name: "STEP 1 | Existing Kong version"
      debug:
        msg: "Kong already installed: {{ kong_existing_ver.stdout }}"
      when: kong_bin.rc == 0
      tags: [install]

    # install only when not present
    - name: "STEP 1 | Remove stale Kong repo files"
      shell: |
        rm -f /etc/apt/sources.list.d/kong*.list
        rm -f /etc/apt/sources.list.d/kong*.sources
        rm -f /usr/share/keyrings/kong*.gpg
        rm -f /usr/share/keyrings/kong*.asc
        rm -f /etc/apt/trusted.gpg.d/kong*.gpg
      changed_when: false
      when: kong_bin.rc != 0
      tags: [install]

    - name: "STEP 1 | Import Kong GPG key"
      shell: |
        curl -fsSL \
          https://packages.konghq.com/public/gateway-39/gpg.E7ECF02AC16C5DB8.key \
          -o /tmp/kong.gpg.key
        gpg --dearmor < /tmp/kong.gpg.key \
          > /usr/share/keyrings/kong-archive-keyring.gpg
        rm -f /tmp/kong.gpg.key
      when: kong_bin.rc != 0
      changed_when: true
      tags: [install]

    - name: "STEP 1 | Add Kong APT repo"
      copy:
        dest: /etc/apt/sources.list.d/kong-gateway-39.list
        content: |
          deb [signed-by=/usr/share/keyrings/kong-archive-keyring.gpg] https://packages.konghq.com/public/gateway-39/deb/ubuntu {{ ansible_distribution_release }} main
      when: kong_bin.rc != 0
      tags: [install]

    - name: "STEP 1 | apt update after Kong repo"
      shell: export DEBIAN_FRONTEND=noninteractive && apt-get update 2>&1
      when: kong_bin.rc != 0
      changed_when: false
      failed_when: false
      tags: [install]

    - name: "STEP 1 | Check Kong package is available"
      shell: apt-cache show kong 2>&1 | head -3
      register: kong_cache
      when: kong_bin.rc != 0
      changed_when: false
      failed_when: false
      tags: [install]

    - name: "STEP 1 | Fallback — use trusted=yes repo if signed-by failed"
      copy:
        dest: /etc/apt/sources.list.d/kong-gateway-39.list
        content: |
          deb [trusted=yes] https://packages.konghq.com/public/gateway-39/deb/ubuntu {{ ansible_distribution_release }} main
      when:
        - kong_bin.rc != 0
        - kong_cache is defined
        - "'Package: kong' not in (kong_cache.stdout | default(''))"
      tags: [install]

    - name: "STEP 1 | apt update after fallback repo"
      shell: export DEBIAN_FRONTEND=noninteractive && apt-get update 2>&1
      when:
        - kong_bin.rc != 0
        - kong_cache is defined
        - "'Package: kong' not in (kong_cache.stdout | default(''))"
      changed_when: false
      tags: [install]

    - name: "STEP 1 | Install Kong package"
      shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get install -y kong 2>&1
      when: kong_bin.rc != 0
      changed_when: true
      tags: [install]

    - name: "STEP 1 | Verify kong binary"
      command: kong version
      register: kong_ver
      changed_when: false
      tags: [install]

    - name: "STEP 1 | Kong version confirmed"
      debug:
        msg: "{{ kong_ver.stdout }}"
      tags: [install]

    # ==========================================================
    # STEP 2 — MOCK BACKEND (Python, port 9090)
    # Always returns 200 — no external dependency
    # ==========================================================
    - name: "STEP 2 | Kill any existing process on port {{ mock_port }}"
      shell: fuser -k {{ mock_port }}/tcp 2>/dev/null || true
      changed_when: false
      tags: [mock]

    - name: "STEP 2 | Write mock backend script"
      copy:
        dest: /opt/kong-mock-server.py
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json, datetime, random, urllib.parse

          ROUTES = {
              "/hello":   {"message": "Hello from Kong DB-Less!"},
              "/health":  {"status": "ok", "database": "none (db-less)"},
              "/users":   {"users": [{"id": 1, "name": "Alice"}, {"id": 2, "name": "Bob"}]},
              "/orders":  {"orders": [{"id": 101, "item": "Widget", "qty": 3}]},
              "/metrics": {"rps": random.randint(10, 50), "latency_ms": random.randint(1, 20)},
          }

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  path = urllib.parse.urlparse(self.path).path
                  body = json.dumps({
                      **ROUTES.get(path, {"message": f"ok — {path}"}),
                      "path":      self.path,
                      "mode":      "kong-db-less",
                      "timestamp": datetime.datetime.utcnow().isoformat() + "Z",
                  }, indent=2).encode()
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.end_headers()
                  self.wfile.write(body)
              def log_message(self, fmt, *args):
                  pass

          if __name__ == "__main__":
              print("Mock backend listening on :9090")
              HTTPServer(("0.0.0.0", 9090), Handler).serve_forever()
      tags: [mock]

    - name: "STEP 2 | Create mock backend systemd service"
      copy:
        dest: /lib/systemd/system/kong-mock.service
        mode: "0644"
        content: |
          [Unit]
          Description=Kong Mock Backend (DB-Less)
          After=network.target

          [Service]
          ExecStart=/usr/bin/python3 /opt/kong-mock-server.py
          Restart=always
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
      tags: [mock]

    - name: "STEP 2 | Start mock backend"
      systemd:
        name: kong-mock
        daemon_reload: yes
        state: started
        enabled: yes
      tags: [mock]

    - name: "STEP 2 | Wait for mock backend on :{{ mock_port }}"
      wait_for:
        host: localhost
        port: "{{ mock_port }}"
        delay: 2
        timeout: 15
      tags: [mock]

    - name: "STEP 2 | Verify mock backend responds"
      uri:
        url: "http://localhost:{{ mock_port }}/health"
        method: GET
        status_code: 200
        return_content: yes
      register: mock_resp
      tags: [mock]

    - name: "STEP 2 | Mock backend OK"
      debug:
        msg: "Mock backend running on :{{ mock_port }} — {{ mock_resp.json }}"
      tags: [mock]

    # ==========================================================
    # STEP 3 — WRITE kong.conf  (database = off)
    # ==========================================================
    - name: "STEP 3 | Stop Kong if currently running"
      service:
        name: kong
        state: stopped
      failed_when: false
      tags: [configure]

    - name: "STEP 3 | Write kong.conf — DB-Less mode"
      copy:
        dest: "{{ kong_conf }}"
        owner: root
        mode: "0644"
        content: |
          # ── Kong DB-Less Configuration ──────────────────────
          # NO DATABASE — config loaded from kong.yml

          database           = off
          declarative_config = {{ kong_yml }}

          proxy_listen       = 0.0.0.0:{{ kong_proxy_port }}
          admin_listen       = 0.0.0.0:{{ kong_admin_port }}

          log_level          = notice
          proxy_access_log   = /dev/stdout
          proxy_error_log    = /dev/stderr
          admin_access_log   = /dev/stdout
          admin_error_log    = /dev/stderr
      tags: [configure]

    # ==========================================================
    # STEP 4 — WRITE kong.yml  (declarative config)
    # ==========================================================
    - name: "STEP 4 | Write kong.yml — services / routes / plugins"
      copy:
        dest: "{{ kong_yml }}"
        owner: root
        mode: "0644"
        content: |
          # ── Kong Declarative Config ─────────────────────────
          # Edit this file and run:
          #   sudo kong reload -c /etc/kong/kong.conf
          _format_version: "3.0"
          _transform: true

          # ── Services (upstream backends) ────────────────────
          services:

            - name: mock-service
              url: http://localhost:{{ mock_port }}
              connect_timeout: 5000
              read_timeout: 10000
              routes:
                - name: test-route
                  paths:
                    - /test-api
                  strip_path: true
                  methods: [GET, POST]

                - name: api-route
                  paths:
                    - /api
                  strip_path: true
                  methods: [GET, POST]

            - name: health-service
              url: http://localhost:{{ mock_port }}
              routes:
                - name: health-route
                  paths:
                    - /health
                  strip_path: false
                  methods: [GET]

          # ── Consumers (API users with keys) ─────────────────
          consumers:

            - username: test-user
              keyauth_credentials:
                - key: "{{ api_key }}"

            - username: admin-user
              keyauth_credentials:
                - key: "{{ admin_key }}"

          # ── Plugins ─────────────────────────────────────────
          plugins:

            - name: key-auth
              config:
                key_names:
                  - apikey
                  - x-api-key
                hide_credentials: true

            - name: rate-limiting
              config:
                minute: 30
                hour: 500
                policy: local

            - name: response-transformer
              config:
                add:
                  headers:
                    - "X-Kong-Mode:db-less"
                    - "X-Powered-By:Kong-Gateway"
      tags: [configure]

    # ==========================================================
    # STEP 5 — VALIDATE CONFIG SYNTAX
    # ==========================================================
    - name: "STEP 5 | Validate kong.yml syntax"
      command: kong config parse {{ kong_yml }}
      register: parse_out
      changed_when: false
      tags: [configure]

    - name: "STEP 5 | Config syntax valid"
      debug:
        msg: "{{ parse_out.stdout | default('kong.yml syntax OK') }}"
      tags: [configure]

    # ==========================================================
    # STEP 6 — START KONG
    # ==========================================================
    - name: "STEP 6 | Create Kong systemd unit"
      copy:
        dest: /lib/systemd/system/kong.service
        owner: root
        mode: "0644"
        content: |
          [Unit]
          Description=Kong API Gateway (DB-Less)
          After=network.target

          [Service]
          User=root
          Group=root
          Type=forking
          ExecStartPre=/usr/local/bin/kong prepare \
            -p /usr/local/kong \
            -c /etc/kong/kong.conf
          ExecStart=/usr/local/bin/kong start  -c /etc/kong/kong.conf
          ExecReload=/usr/local/bin/kong reload -c /etc/kong/kong.conf
          ExecStop=/usr/local/bin/kong  stop
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target
      tags: [start]

    - name: "STEP 6 | Reload systemd and start Kong"
      systemd:
        name: kong
        daemon_reload: yes
        state: started
        enabled: yes
      tags: [start]

    - name: "STEP 6 | Wait for Admin API on :{{ kong_admin_port }}"
      wait_for:
        host: localhost
        port: "{{ kong_admin_port }}"
        delay: 5
        timeout: 60
        msg: "Kong Admin API did not come up within 60s"
      tags: [start]

    - name: "STEP 6 | Wait for Proxy on :{{ kong_proxy_port }}"
      wait_for:
        host: localhost
        port: "{{ kong_proxy_port }}"
        delay: 2
        timeout: 30
      tags: [start]

    # ==========================================================
    # STEP 7 — HEALTH CHECK
    # ==========================================================
    - name: "STEP 7 | Admin API health check"
      uri:
        url: "{{ kong_admin_url }}"
        method: GET
        status_code: 200
        return_content: yes
        timeout: 10
      register: health
      tags: [start, test]

    - name: "STEP 7 | Confirm DB-Less mode is active"
      debug:
        msg: >
          Kong v{{ health.json.version }} is UP |
          database = {{ health.json.configuration.database }} |
          DB-Less = {{ health.json.configuration.database == 'off' }}
      tags: [start, test]

    - name: "STEP 7 | Fail if Kong is NOT in DB-Less mode"
      fail:
        msg: >
          Kong started but database =
          {{ health.json.configuration.database }}.
          Expected 'off'. Check /etc/kong/kong.conf.
      when: health.json.configuration.database != 'off'
      tags: [start, test]

    # ==========================================================
    # STEP 8 — E2E TESTS
    # ==========================================================

    # ── Test 1: No API key → expect 401 ──────────────────────
    - name: "STEP 8 | TEST 1 — no API key (expect 401)"
      uri:
        url: "{{ kong_proxy_url }}/test-api/hello"
        method: GET
        status_code: 401
        timeout: 10
      register: t1
      tags: [test]

    - name: "STEP 8 | TEST 1 PASSED — key-auth blocking unauthenticated"
      debug:
        msg: "No key → HTTP {{ t1.status }} (401 Unauthorized) ✔"
      tags: [test]

    # ── Test 2: With API key → expect 200 ────────────────────
    - name: "STEP 8 | TEST 2 — with API key (expect 200)"
      uri:
        url: "{{ kong_proxy_url }}/test-api/hello"
        method: GET
        headers:
          apikey: "{{ api_key }}"
        status_code: 200
        timeout: 15
        return_content: yes
      register: t2
      tags: [test]

    - name: "STEP 8 | TEST 2 PASSED — proxy working"
      debug:
        msg: >
          With key → HTTP {{ t2.status }} ✔ |
          Response: {{ t2.json.message | default('ok') }}
      tags: [test]

    # ── Test 3: /api route → expect 200 ──────────────────────
    - name: "STEP 8 | TEST 3 — /api/users route (expect 200)"
      uri:
        url: "{{ kong_proxy_url }}/api/users"
        method: GET
        headers:
          apikey: "{{ api_key }}"
        status_code: 200
        timeout: 10
        return_content: yes
      register: t3
      tags: [test]

    - name: "STEP 8 | TEST 3 PASSED — /api route working"
      debug:
        msg: "HTTP {{ t3.status }} ✔ | {{ t3.json }}"
      tags: [test]

    # ── Test 4: /health route → expect 200 ───────────────────
    - name: "STEP 8 | TEST 4 — /health route (expect 200)"
      uri:
        url: "{{ kong_proxy_url }}/health"
        method: GET
        headers:
          apikey: "{{ api_key }}"
        status_code: 200
        timeout: 10
      register: t4
      tags: [test]

    - name: "STEP 8 | TEST 4 PASSED — health route working"
      debug:
        msg: "HTTP {{ t4.status }} ✔"
      tags: [test]

    # ── Test 5: Admin key → expect 200 ───────────────────────
    - name: "STEP 8 | TEST 5 — admin key (expect 200)"
      uri:
        url: "{{ kong_proxy_url }}/test-api/hello"
        method: GET
        headers:
          apikey: "{{ admin_key }}"
        status_code: 200
        timeout: 10
      register: t5
      tags: [test]

    - name: "STEP 8 | TEST 5 PASSED — admin consumer working"
      debug:
        msg: "Admin key → HTTP {{ t5.status }} ✔"
      tags: [test]

    # ── Test 6: Rate-limit headers present ───────────────────
    - name: "STEP 8 | TEST 6 — rate-limit headers"
      uri:
        url: "{{ kong_proxy_url }}/test-api/hello"
        method: GET
        headers:
          apikey: "{{ api_key }}"
        status_code: 200
        timeout: 10
      register: t6
      tags: [test]

    - name: "STEP 8 | TEST 6 — rate-limit header check"
      debug:
        msg: >
          X-RateLimit-Limit-Minute:
          {{ t6.x_ratelimit_limit_minute | default('header present') }} |
          Remaining:
          {{ t6.x_ratelimit_remaining_minute | default('see response') }}
      tags: [test]

    # ── List entities loaded from kong.yml ────────────────────
    - name: "STEP 8 | Fetch loaded services"
      uri:
        url: "{{ kong_admin_url }}/services"
        return_content: yes
      register: svc_list
      tags: [test]

    - name: "STEP 8 | Fetch loaded routes"
      uri:
        url: "{{ kong_admin_url }}/routes"
        return_content: yes
      register: route_list
      tags: [test]

    - name: "STEP 8 | Fetch loaded plugins"
      uri:
        url: "{{ kong_admin_url }}/plugins"
        return_content: yes
      register: plugin_list
      tags: [test]

    - name: "STEP 8 | Fetch loaded consumers"
      uri:
        url: "{{ kong_admin_url }}/consumers"
        return_content: yes
      register: consumer_list
      tags: [test]

    # ==========================================================
    # STEP 9 — FINAL SUMMARY
    # ==========================================================
    - name: "STEP 9 | FINAL SUMMARY"
      debug:
        msg: |

          ╔═══════════════════════════════════════════════════════════════╗
          ║       Kong API Gateway — DB-Less — ALL SYSTEMS GO!           ║
          ╠═══════════════════════════════════════════════════════════════╣
          ║  Kong Version  : {{ health.json.version }}
          ║  Database      : {{ health.json.configuration.database }} (DB-Less — no PostgreSQL)
          ║  Config File   : {{ kong_yml }}
          ║  Proxy         : http://localhost:{{ kong_proxy_port }}
          ║  Admin API     : http://localhost:{{ kong_admin_port }}
          ║  Mock Backend  : http://localhost:{{ mock_port }}
          ╠═══════════════════════════════════════════════════════════════╣
          ║  Services  : {{ svc_list.json.data | map(attribute='name') | list }}
          ║  Routes    : {{ route_list.json.data | map(attribute='name') | list }}
          ║  Plugins   : {{ plugin_list.json.data | map(attribute='name') | list }}
          ║  Consumers : {{ consumer_list.json.data | map(attribute='username') | list }}
          ╠═══════════════════════════════════════════════════════════════╣
          ║  TEST RESULTS                                                ║
          ║    Test 1 — No key → 401          : {{ t1.status }} ✔
          ║    Test 2 — test-user key → 200   : {{ t2.status }} ✔
          ║    Test 3 — /api/users → 200      : {{ t3.status }} ✔
          ║    Test 4 — /health → 200         : {{ t4.status }} ✔
          ║    Test 5 — admin key → 200       : {{ t5.status }} ✔
          ╠═══════════════════════════════════════════════════════════════╣
          ║  QUICK TEST COMMANDS                                         ║
          ║                                                              ║
          ║  # Authenticated — expect 200                               ║
          ║  curl -i http://localhost:8000/test-api/hello \             ║
          ║       -H "apikey: {{ api_key }}"
          ║                                                              ║
          ║  # No key — expect 401                                      ║
          ║  curl -i http://localhost:8000/test-api/hello               ║
          ║                                                              ║
          ║  # Admin API info                                           ║
          ║  curl -s http://localhost:8001 | python3 -m json.tool       ║
          ║                                                              ║
          ║  # Reload config after editing kong.yml (no restart)        ║
          ║  sudo kong reload -c /etc/kong/kong.conf                   ║
          ║                                                              ║
          ║  # Service status + logs                                    ║
          ║  systemctl status kong                                      ║
          ║  journalctl -u kong -f                                      ║
          ╚═══════════════════════════════════════════════════════════════╝
      tags: [test]

  # ── handlers ───────────────────────────────────────────────
  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes
