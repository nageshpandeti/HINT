---
- name: Setup and Run Kong (DB-less)
  hosts: localhost
  connection: local
  become: yes
  gather_facts: yes

  vars:
    kong_container_name: kong
    kong_image: kong:3.6

  tasks:

    - name: Install required packages
      apt:
        name:
          - docker.io
          - python3-pip
        state: present
        update_cache: yes

    - name: Install docker python module
      pip:
        name: docker

    - name: Start and enable docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Pull Kong image
      community.docker.docker_image:
        name: "{{ kong_image }}"
        source: pull

    - name: Run Kong container (DB-less mode)
      community.docker.docker_container:
        name: "{{ kong_container_name }}"
        image: "{{ kong_image }}"
        state: started
        restart_policy: always
        ports:
          - "8000:8000"
          - "8443:8443"
          - "8001:8001"
          - "8444:8444"
        env:
          KONG_DATABASE: "off"
          KONG_DECLARATIVE_CONFIG: "/kong/declarative/kong.yml"
          KONG_PROXY_ACCESS_LOG: /dev/stdout
          KONG_ADMIN_ACCESS_LOG: /dev/stdout
          KONG_PROXY_ERROR_LOG: /dev/stderr
          KONG_ADMIN_ERROR_LOG: /dev/stderr
          KONG_ADMIN_LISTEN: "0.0.0.0:8001"
        command: "kong start"

    - name: Wait for Kong to start
      wait_for:
        host: localhost
        port: 8001
        delay: 5
        timeout: 60

    - name: Check Kong Admin API
      uri:
        url: http://localhost:8001
        method: GET
      register: kong_status
      retries: 5
      delay: 5
      until: kong_status.status == 200

    - name: Display Kong status
      debug:
        var: kong_status.status
